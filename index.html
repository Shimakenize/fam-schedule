<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>スケジュール</title>
  <!-- GitHub Actions トリガーテスト用コメント -->
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; background: #0f1419; color: #e5e7eb; }
    .auth-banner { padding: 10px 20px; background: #422006; color: #fde68a; font-size: 0.9rem; }
    .auth-banner .relogin-inner { max-width: 560px; margin: 0 auto; line-height: 1.5; }
    .auth-banner .relogin-actions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    /* 駐車場アプリに合わせたコンパクトヘッダ（タイトル1行） */
    .app-header { background: #0b1220; color: #fff; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #233041; }
    .app-header-logo { height: 36px; width: auto; margin-right: 10px; }
    .app-header-icon { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; object-fit: cover; border: 1px solid #233041; }
    .header-main { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .header-title-line { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-title-line .ver { font-weight: 600; opacity: 0.9; font-size: 0.92rem; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; min-width: 0; max-width: 55%; }
    .header-user { font-size: 0.72rem; color: #93c5fd; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
    .id-toggle-label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.68rem; color: #94a3b8; white-space: nowrap; user-select: none; flex-shrink: 0; }
    .id-toggle-label input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .id-toggle-slider { width: 34px; height: 18px; border-radius: 9px; background: #374151; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .id-toggle-slider::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #e5e7eb; top: 2px; left: 2px; transition: transform 0.2s; }
    .id-toggle-label input:focus-visible + .id-toggle-slider { outline: 2px solid #2ed3c6; outline-offset: 2px; }
    .id-toggle-label input:checked + .id-toggle-slider { background: #0d9488; }
    .id-toggle-label input:checked + .id-toggle-slider::after { transform: translateX(16px); background: #fff; }
    /* ビュータブ（Monthly / Week / Weekend / 管理） */
    .view-tabs { display: flex; flex-wrap: wrap; align-items: stretch; gap: 0; background: #111827; border-bottom: 1px solid #233041; padding: 0 8px; }
    .view-tab { background: transparent; border: none; color: #94a3b8; padding: 11px 14px; font-size: 0.88rem; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px; font-family: inherit; }
    .view-tab:hover { color: #e5e7eb; }
    .view-tab.active { color: #fff; border-bottom-color: #2ed3c6; font-weight: 600; }
    .view-tab[hidden] { display: none !important; }
    .meta-strip { padding: 6px 16px; font-size: 0.72rem; color: #9ccce6; background: #0b1220; border-bottom: 1px solid #233041; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .toolbar-wrap { padding: 14px 16px; background: #111827; border-bottom: 1px solid #233041; }
    .toolbar-row { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 12px 16px; }
    .field label { display: block; font-size: 0.82rem; color: #9ccce6; margin-bottom: 4px; }
    .field label.past-filter-label { display: flex; align-items: center; gap: 6px; margin-bottom: 0; cursor: pointer; min-height: 38px; }
    .field label.past-filter-label input { margin: 0; flex-shrink: 0; }
    .field select { padding: 8px 10px; border: 1px solid #2b4258; border-radius: 8px; background: #0b1220; color: #e5e7eb; font-size: 0.92rem; min-width: 110px; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.92rem; }
    .btn-primary { background: #2ed3c6; color: #06212b; font-weight: 700; }
    .table-wrap { padding: 14px 16px; overflow-x: auto; }
    table.data-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .data-table th, .data-table td { border: 1px solid #233041; padding: 8px 10px; text-align: left; }
    .data-table th { background: #0b1220; color: #9ccce6; font-weight: 600; }
    tr.row-week-start td { border-top: 3px solid #2ed3c6; }
    tr.row-day-start td { border-top: 2px solid #2ed3c6; }
    tr.row-deleted td { opacity: 0.55; text-decoration: line-through; }
    tr.row-new td { box-shadow: inset 3px 0 0 #22c55e; }
    tr.row-changed td { box-shadow: inset 3px 0 0 #eab308; }
    tr.row-near td { background: #4a3b00; }
    tr.row-conflict td { background: #5a1d1d; }
    tr.row-off td { opacity: 0.72; background: #151c24; }
    /* OFF / 削除(履歴): 状態列以外は訂正線＋グレー */
    tr.row-void td:not(.col-status) {
      color: #6b7280;
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      background: #151c24;
    }
    tr.row-void td.col-status {
      color: #e5e7eb;
      text-decoration: none;
      background: #1a2332;
      line-height: 1.45;
      white-space: pre-line;
      font-size: 0.8rem;
    }
    /* 開催日が過去: グレーアウトのみ（訂正線なし）。row-void と併用時も線を消す */
    tr.row-past td:not(.col-status) {
      color: #6b7280;
      opacity: 0.9;
      background: #151c24;
      text-decoration: none !important;
    }
    tr.row-past td.col-status {
      color: #94a3b8;
      text-decoration: none;
      background: #1a2332;
      line-height: 1.45;
      white-space: pre-line;
      font-size: 0.8rem;
    }
    tr.row-past .title-league { color: #6b7280; }
    .cell-old {
      color: #6b7280;
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      margin-right: 6px;
    }
    .cell-new { color: #a7f3d0; font-weight: 500; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; }
    .badge-match { background: #1e3a5f; color: #bfdbfe; }
    .badge-marinos { background: #003f8a; color: #fbbf24; }
    .badge-marinos-muted { background: #374151; color: #9ca3af; }
    .badge-adhoc { background: #3d2a5c; color: #e9d5ff; }
    .badge-tr { background: #14532d; color: #bbf7d0; }
    .badge-trg { background: #164e63; color: #a5f3fc; }
    .badge-juku { background: #7c2d12; color: #fed7aa; }
    .badge-private { background: #3f2a56; color: #e9d5ff; }
    .badge-gasshuku { background: #422006; color: #fde68a; }
    .badge-match-muted { background: #374151; color: #9ca3af; }
    .badge-adhoc-muted { background: #3f3f46; color: #a1a1aa; }
    .badge-tr-muted { background: #374151; color: #9ca3af; }
    .badge-trg-muted { background: #374151; color: #9ca3af; }
    .badge-juku-muted { background: #4a2f24; color: #d6d3d1; }
    .badge-private-muted { background: #3f3f46; color: #a1a1aa; }
    .badge-gasshuku-muted { background: #3f3f46; color: #a1a1aa; }
    .badge-pending-inline { background: #713f12; color: #fde68a; font-size: 0.65rem; vertical-align: middle; }
    .pending-inp { width: 100%; max-width: 100%; padding: 4px 6px; font-size: 0.8rem; border: 1px solid #2b4258; border-radius: 6px; background: #0b1220; color: #e5e7eb; box-sizing: border-box; }
    .error { padding: 20px 16px; color: #fca5a5; }
    .empty { padding: 20px 16px; color: #94a3b8; }
    .access-panel { margin: 0 16px 12px; padding: 12px 14px; border-radius: 8px; border: 1px solid #854d0e; background: #0b1220; font-size: 0.86rem; color: #fde68a; }
    .admin-panel { margin: 0; padding: 14px 16px; font-size: 0.88rem; color: #bfdbfe; }
    .admin-panel .inner { padding: 12px 14px; border-radius: 8px; border: 1px solid #1e5f8b; background: #0b1220; }
    .admin-panel table { font-size: 0.82rem; margin-top: 8px; width: 100%; border-collapse: collapse; }
    .admin-panel th, .admin-panel td { border: 1px solid #233041; padding: 8px 10px; text-align: left; }
    .admin-panel th { background: #0b1220; color: #9ccce6; }
    .admin-section-title { margin-top: 14px; font-weight: 700; }
    .admin-section-title:first-child { margin-top: 0; }
    .identity-panel { margin-bottom: 14px; padding: 12px 14px; border-radius: 8px; border: 1px solid #2e6b8f; background: #0d2137; font-size: 0.86rem; }
    .identity-panel .label { color: #7dd3fc; font-size: 0.72rem; margin-top: 8px; }
    .identity-panel .label:first-child { margin-top: 0; }
    .identity-panel .value { word-break: break-all; font-family: ui-monospace, monospace; font-size: 0.82rem; }
    .btn-sm { padding: 4px 10px; font-size: 0.78rem; margin-right: 6px; }
    .btn-warn { background: #b45309; color: #fff; }
    .toolbar-wrap.disabled { opacity: 0.45; pointer-events: none; }
    .week-block-title { font-size: 0.9rem; font-weight: 600; color: #9ccce6; margin: 16px 0 8px; padding: 0 16px; }
    .week-block-title:first-of-type { margin-top: 8px; }
    .sub-hint { font-size: 0.78rem; color: #94a3b8; margin: 4px 0 8px; padding: 0 16px; }
    .data-table thead tr.filters th { padding: 6px 8px; vertical-align: middle; font-weight: 500; }
    .data-table .th-filter-select, .data-table .th-filter-input {
      width: 100%; max-width: 160px; padding: 4px 6px; font-size: 0.78rem;
      border: 1px solid #2b4258; border-radius: 6px; background: #0b1220; color: #e5e7eb;
    }
    .data-table .th-filter-input { max-width: 220px; }
    .data-table .cat-filter-group { display: flex; flex-wrap: wrap; gap: 4px 10px; align-items: center; }
    .data-table .cat-filter-item { display: inline-flex; align-items: center; gap: 4px; font-size: 0.76rem; color: #cbd5e1; white-space: nowrap; }
    .data-table .cat-filter-item input[type="checkbox"] { accent-color: #2ed3c6; }
    .badge-cat-u13 { background: #4c1d95; color: #ede9fe; }
    .badge-cat-u14 { background: #1d4ed8; color: #dbeafe; }
    .badge-cat-u15 { background: #0f766e; color: #ccfbf1; }
    .badge-cat-all { background: #475569; color: #f1f5f9; }
    .badge-cat-other { background: #374151; color: #d1d5db; }
    .badge-cat-muted { background: #374151 !important; color: #9ca3af !important; }
    .title-league { font-size: 0.78rem; color: #9ccce6; margin-bottom: 3px; line-height: 1.35; }
    tr.row-void .title-league { color: #6b7280; }
    /* 週・週末: 表 / タイムライン切替 */
    .seg-toggle { display: inline-flex; border: 1px solid #2b4258; border-radius: 8px; overflow: hidden; }
    .seg-toggle .seg-btn {
      background: #0b1220; color: #94a3b8; border: none; padding: 8px 12px; font-size: 0.82rem; cursor: pointer; font-family: inherit;
    }
    .seg-toggle .seg-btn:hover { color: #e5e7eb; }
    .seg-toggle .seg-btn.active { background: #1e3a5f; color: #fff; font-weight: 600; }
    .tl-filter-chrome { margin-bottom: 4px; }
    .tl-wrap { padding: 0 12px 16px; overflow-x: auto; }
    .tl-scroll-inner { min-width: 520px; }
    .tl-header-row { display: flex; align-items: stretch; border-bottom: 1px solid #233041; }
    .tl-corner { width: 48px; flex-shrink: 0; padding: 8px 4px; font-size: 0.65rem; color: #64748b; display: flex; align-items: flex-end; }
    .tl-tz { line-height: 1.2; }
    .tl-day-head { flex: 1; min-width: 56px; text-align: center; padding: 8px 4px; font-size: 0.8rem; color: #9ccce6; border-left: 1px solid #233041; }
    .tl-day-head--today .tl-dom-wrap { display: inline-block; background: #2563eb; color: #fff; border-radius: 999px; padding: 2px 8px; }
    .tl-dow { color: #94a3b8; font-size: 0.72rem; }
    .tl-dom { font-weight: 700; }
    .tl-allday-row { display: flex; border-bottom: 1px solid #233041; background: #0b1220; }
    .tl-gutter-spacer { width: 48px; flex-shrink: 0; }
    .tl-allday-cell { flex: 1; min-width: 56px; border-left: 1px solid #233041; padding: 4px; min-height: 28px; display: flex; flex-wrap: wrap; gap: 4px; align-content: flex-start; }
    .tl-chip { font-size: 0.65rem; padding: 3px 6px; border-radius: 6px; background: #1e3a5f; color: #bfdbfe; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tl-chip--muted { opacity: 0.55; background: #374151; color: #9ca3af; }
    .tl-main-row { display: flex; align-items: stretch; }
    .tl-time-ruler { width: 48px; flex-shrink: 0; height: 640px; position: relative; border-right: 1px solid #233041; }
    .tl-hlab { position: absolute; left: 0; right: 2px; text-align: right; font-size: 0.68rem; color: #64748b; transform: translateY(-50%); }
    .tl-days-strip { display: flex; flex: 1; min-width: 0; }
    .tl-day-body { flex: 1; min-width: 56px; height: 640px; position: relative; border-left: 1px solid #233041;
      background: repeating-linear-gradient(to bottom, #0f1419 0, #0f1419 39px, #1a2332 39px, #1a2332 40px); }
    .tl-blocks-layer { position: absolute; inset: 0; pointer-events: none; }
    .tl-block { position: absolute; pointer-events: auto; box-sizing: border-box; padding: 2px 4px; border-radius: 6px;
      background: #1e3a5f; color: #e5e7eb; font-size: 0.62rem; line-height: 1.25; overflow: hidden; border: 1px solid #334155;
      box-shadow: 0 1px 2px rgba(0,0,0,0.35); }
    .tl-block-inner { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
    .tl-block--muted { opacity: 0.55; }
    .tl-block.row-conflict { background: #5a1d1d; border-color: #b91c1c; }
    .tl-block.row-near { background: #4a3b00; border-color: #a16207; }
    .tl-block.row-past { filter: grayscale(0.15); }
    .tl-block.row-void { text-decoration: line-through; }
    .tl-block.tl-block--provisional { border-style: dashed; border-color: #64748b; background: #1a2a3d; }
  </style>
</head>
<body>
  <div id="dev-banner" style="display:none;background:#854d0e;color:#fef9c3;padding:5px 16px;font-size:0.78rem;text-align:center;letter-spacing:0.03em;">🔧 Claude Dev Mode — 本番環境 読み取り専用</div>
  <div id="auth-gate" class="auth-banner" style="display:none;"></div>
  <header class="app-header">
    <div class="header-main">
          <img src="/fam-schedule/app_logo.jpg" alt="App logo" class="app-header-logo">
      <div class="header-title-line" id="headerTitleLine">スケジュール <span class="ver" id="verInline"></span></div> <!-- GitHub Actions 再トリガー用コメント 2 -->
      <div class="header-right">
        <div class="header-user" id="headerUser"> </div>
      </div>
    </div>
  </header>

  <nav class="view-tabs" id="viewTabs" aria-label="表示切替" style="display:none;">
    <button type="button" class="view-tab" data-view="month" id="tabMonth">Monthly view</button>
    <button type="button" class="view-tab active" data-view="week" id="tabWeek">Week view</button>
    <button type="button" class="view-tab" data-view="weekend" id="tabWeekend">Weekend view</button>
    <button type="button" class="view-tab" data-view="admin" id="tabAdmin" hidden>管理メニュー</button>
    <button type="button" class="view-tab" data-view="pending" id="tabPending" hidden>仮登録</button>
  </nav>
  <div class="meta-strip" id="metaStrip" style="display:none;"></div>

  <div id="accessPanel" class="access-panel" style="display:none;"></div>

  <div class="toolbar-wrap" id="toolbarWrap" style="display:none;">
    <div class="toolbar-row">
      <div class="field">
        <label for="selYear">年</label>
        <select id="selYear"></select>
      </div>
      <div class="field">
        <label for="selMonth">月</label>
        <select id="selMonth"></select>
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <button type="button" class="btn btn-primary" id="btnLoad">表示</button>
      </div>
      <div class="field" id="pastFilterMonthWrap" style="display:none;">
        <label>&nbsp;</label>
        <label class="past-filter-label" for="chkShowPastMonth" title="開催日が今日より前の行も一覧に含めます">
          <input type="checkbox" id="chkShowPastMonth" autocomplete="off" />
          <span>過去も表示</span>
        </label>
      </div>
      <div class="field" id="weekSelectWrap" style="display:none;">
        <label for="selWeek">週</label>
        <select id="selWeek"></select>
      </div>
      <div class="field" id="pastFilterWeekWrap" style="display:none;">
        <label>&nbsp;</label>
        <label class="past-filter-label" for="chkShowPastWeek" title="開催日が今日より前の行も一覧に含めます">
          <input type="checkbox" id="chkShowPastWeek" autocomplete="off" />
          <span>過去も表示</span>
        </label>
      </div>
      <div class="field" id="weekDisplayModeWrap" style="display:none;">
        <label>表示形式</label>
        <div class="seg-toggle" role="group" aria-label="週の表示形式">
          <button type="button" class="seg-btn active" data-mode="table">一覧表</button>
          <button type="button" class="seg-btn" data-mode="timeline">タイムライン</button>
        </div>
      </div>
    </div>
  </div>

  <div id="viewContent"><div class="empty" id="loading">読み込み中…</div></div>

  <script>
    window.__CONFIG_URL__ = 'https://script.google.com/macros/s/AKfycbyL5cGZoR5DIh8yFlehAUrmNqVPagfjOFxImRInQOXxSfys0Z3zXgIqATpPG5ahH2jd/exec';
    window.__API_BASE__ = window.__CONFIG_URL__;
    window.__LIFF_ID__ = '';
    window.__APP_VERSION__ = '';
    window.__ALLOWED_GROUP_IDS__ = [];
    window.__SCHEDULE_REQUIRE_APPROVAL__ = true;
    window.__SHOW_IDENTITY_UI__ = false;

    async function fetchConfig() {
      var res = await fetch(window.__CONFIG_URL__ + '?_path=config');
      var c = await res.json();
      window.__LIFF_ID__ = c.liff_id || '';
      window.__APP_VERSION__ = c.version || '';
      window.__SCHEDULE_REQUIRE_APPROVAL__ = c.require_approval !== false;
      window.__ALLOWED_GROUP_IDS__ = c.allowed_group_ids || [];
    }

    function applyVersionLabel() {
      var ver = String(window.__APP_VERSION__ || '').trim();
      var verText = ver ? ('(v' + ver + ')') : '';
      document.getElementById('verInline').textContent = verText;
      document.title = 'スケジュール' + (verText ? ' ' + verText : '');
    }

    var DEV_TOKEN = new URLSearchParams(location.search).get('dev') || '';
    var IS_DEV_BYPASS = DEV_TOKEN.length > 0;
    var idToken = '';
    var lineUserId = '';
    var liffGroupId = '';
    var __lastMe = null;
    var __cachedMonthData = null;
    var currentView = 'week';
    var WEEKDAY_JA = ['日', '月', '火', '水', '木', '金', '土'];
    var _filterKind = '';
    // 既定は U-13 表示（家族向けの初期表示）
    var _filterAgeTiers = { u13: true, u14: false, u15: false };
    var _filterTitle = '';
    var _selectedWeekKey = '';
    var _selectedWeekendKey = '';
    var _titleDebounceTimer = null;
    var _lastLoadedYm = '';
    var _showPastEvents = { month: false, week: false, weekend: false };
    var _showIdentityIds = false;
    var _cachedHeaderWithIds = '';
    var _cachedHeaderNoIds = '';
    var _cachedMetaText = '';
    var TL_DISPLAY_MODE_KEY = 'scheduleWeekDisplayMode';
    var TL_START_MIN = 6 * 60;
    var TL_END_MIN = 22 * 60;
    var TL_TOTAL_MIN = TL_END_MIN - TL_START_MIN;
    var __weekDisplayModeBound = false;

    function readIdentityIdsPref() {
      if (!window.__SHOW_IDENTITY_UI__) return false;
      try {
        return localStorage.getItem('app_show_identity_ids') === '1';
      } catch (e) {
        return false;
      }
    }

    function writeIdentityIdsPref(on) {
      if (!window.__SHOW_IDENTITY_UI__) return;
      try {
        if (on) localStorage.setItem('app_show_identity_ids', '1');
        else localStorage.removeItem('app_show_identity_ids');
      } catch (e) { /* ignore */ }
    }

    function applyIdentityIdsVisibility() {
      var show = !!window.__SHOW_IDENTITY_UI__ && _showIdentityIds;
      var chk = document.getElementById('chkShowIdentityIds');
      if (chk) chk.checked = show;

      var hu = document.getElementById('headerUser');
      if (hu) {
        hu.textContent = show ? _cachedHeaderWithIds : _cachedHeaderNoIds;
      }

      var meta = document.getElementById('metaStrip');
      if (!meta) return;
      meta.textContent = _cachedMetaText;
      var granted = __lastMe && (!__lastMe.require_approval || __lastMe.access_granted);
      if (granted) {
        meta.style.display = show ? 'block' : 'none';
      }
    }

    function bindIdentityIdsToggle() {
      if (!window.__SHOW_IDENTITY_UI__) {
        _showIdentityIds = false;
        return;
      }
      var chk = document.getElementById('chkShowIdentityIds');
      if (!chk) return;
      _showIdentityIds = readIdentityIdsPref();
      chk.checked = _showIdentityIds;
      chk.addEventListener('change', function() {
        _showIdentityIds = !!chk.checked;
        writeIdentityIdsPref(_showIdentityIds);
        applyIdentityIdsVisibility();
      });
    }

    function apiUrl(path) {
      var b = (window.__API_BASE__ || '').replace(/\/$/, '');
      var parts = path.split('?');

    function buildTableBody(rows, selectedYear) {
      var h = '<tbody>';
      if (!rows.length) {
        h += '<tr><td colspan="7" class="empty" style="border:none;padding:16px;">条件に一致する行がありません。</td></tr>';
      } else {
        var prevDate = '';
        var prevWeek = '';
        for (var i = 0; i < rows.length; i++) {
          var ev = rows[i];
          var voidRow = isVoidRow(ev);
          var mutedRow = voidRow || isPastEventDate(ev);
          var cls = rowClass(ev);
          if (ev.__riskConflict) cls += (cls ? ' ' : '') + 'row-conflict';
          else if (ev.__riskNear) cls += (cls ? ' ' : '') + 'row-near';
          var dateIso = String(ev.event_date || '').slice(0, 10);
          var currentWeek = '';
          var d = parseLocalDate(ev.event_date);
          if (d) currentWeek = mondayKey(d);
          if (!prevDate || dateIso !== prevDate) {
            if (prevWeek && currentWeek !== prevWeek) {
              cls += (cls ? ' ' : '') + 'row-week-start';
            } else {
              cls += (cls ? ' ' : '') + 'row-day-start';
            }
          }
          prevDate = dateIso;
          prevWeek = currentWeek;
          h += '<tr class="' + esc(cls) + '">';
          h += '<td>' + dateCellWithPrior(ev, selectedYear) + '</td>';
          h += '<td>' + kindCellHTML(ev, mutedRow) + '</td>';
          h += '<td>' + categoryBadgeHTML(ev, mutedRow) + '</td>';
          h += '<td>' + titleCellHTML(ev) + '</td>';
          h += '<td>' + dataCellWithPrior(ev, 'time', (ev.kickoff_primary || ev.time || '')) + '</td>';
          h += '<td>' + dataCellWithPrior(ev, 'venue', ev.venue) + '</td>';
          h += '<td class="col-status">' + statusCellHTML(ev) + '</td>';
          h += '</tr>';
        }
      }
      h += '</tbody>';
      return h;
    }

      var groups = {};

        groups[mondayKey(d)] = true;

    function defaultWeekKey(keys, y, m) {
      if (!keys.length) return '';
      var today = new Date();
      if (today.getFullYear() === y && today.getMonth() + 1 === m) {
        var mk = mondayKey(today);
        if (keys.indexOf(mk) >= 0) return mk;
      }
      return keys[0];
    }

        sel.innerHTML = '';
        return;
      }
      var def = defaultWeekKey(keys, y, mo);
      var weekend = currentView === 'weekend';
      if (weekend) {

          _selectedWeekendKey = def;
        }

          _selectedWeekKey = def;

    function bindPendingPanel() {
      var all = document.getElementById('pendingChkAll');
      if (all) {
        all.onchange = function() {
          document.querySelectorAll('.pending-row-chk').forEach(function(c) {
            c.checked = all.checked;
          });
        };
      }
      var out = document.getElementById('pendingApproveResult');
      var btn = document.getElementById('btnPendingApprove');
      if (btn) {
        btn.addEventListener('click', async function() {
          var items = [];
          document.querySelectorAll('tr[data-eid]').forEach(function(tr) {
            var chk = tr.querySelector('.pending-row-chk');
            if (!chk || !chk.checked) return;
            var patch = {};
            tr.querySelectorAll('.pending-inp').forEach(function(inp) {
              var f = inp.getAttribute('data-f');
              if (f) patch[f] = inp.value;
            });
            items.push({ id: tr.getAttribute('data-eid'), patch: patch });
          });

            alert('本登録する行にチェックを入れてください。');
            return;

            var res = await apiPostJson('/api/admin/schedule/approve-pending', { items: items });
            var msg = '本登録 ' + (res.approved != null ? res.approved : '') + ' 件';
            if (res.skipped && res.skipped.length) msg += '（スキップ ' + res.skipped.length + '）';
            if (out) out.textContent = msg;
            try {
              if (__lastMe && __lastMe.access_granted) {
                await loadMonth();
              } else {

            alert(esc(String(e.message || e)));
          }
        });
      }
      var btnDel = document.getElementById('btnPendingDelete');
      if (btnDel) {
        btnDel.addEventListener('click', async function() {
          var ids = [];
          document.querySelectorAll('tr[data-eid]').forEach(function(tr) {
            var chk = tr.querySelector('.pending-row-chk');
            if (!chk || !chk.checked) return;

          if (out) out.textContent = '削除中…';
          try {
            var res = await apiPostJson('/api/admin/schedule/delete-pending', { event_ids: ids });
            var msg = '削除 ' + (res.deleted != null ? res.deleted : '') + ' 件';
            if (res.skipped && res.skipped.length) msg += '（対象外 ' + res.skipped.length + '）';
            if (out) out.textContent = msg;
            try {
              if (__lastMe && __lastMe.access_granted) {
                await loadMonth();
              } else {
                await showPendingPanel();
              }

              alert(esc(String(e2.message || e2)));

          } catch (e) {
            if (out) out.textContent = '';
            alert(esc(String(e.message || e)));
          }
        });
      }
    }

    function parseLocalDate(dateStr) {
      var p = String(dateStr || '').split('-');
      if (p.length < 3) return null;
      return new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
    }

    function mondayKey(d) {
      if (!d) return '';
      var day = d.getDay();
      var off = day === 0 ? -6 : 1 - day;
      var m = new Date(d.getFullYear(), d.getMonth(), d.getDate() + off);
      return m.getFullYear() + '-' + pad2(m.getMonth() + 1) + '-' + pad2(m.getDate());
    }

    function toIsoDate(d) {
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    function todayIsoJst() {
      try {
        var parts = new Intl.DateTimeFormat('en-CA', {
          timeZone: 'Asia/Tokyo',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        }).formatToParts(new Date());
        var y = '', m = '', d = '';
        for (var i = 0; i < parts.length; i++) {
          var t = parts[i].type;
          if (t === 'year') y = parts[i].value;
          if (t === 'month') m = parts[i].value;
          if (t === 'day') d = parts[i].value;
        }
        return y + '-' + m + '-' + d;
      } catch (e) {
        return '';
      }
    }

    function weekDatesFromMonday(mondayIso) {
      var sd = parseLocalDate(mondayIso);
      if (!sd) return [];
      var out = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(sd.getFullYear(), sd.getMonth(), sd.getDate() + i);
        out.push(toIsoDate(d));
      }
      return out;
    }

    function weekendSatSunFromMonday(mondayIso) {
      var sd = parseLocalDate(mondayIso);
      if (!sd) return [];
      var sat = new Date(sd.getFullYear(), sd.getMonth(), sd.getDate() + 5);
      var sun = new Date(sd.getFullYear(), sd.getMonth(), sd.getDate() + 6);
      return [toIsoDate(sat), toIsoDate(sun)];
    }

    function groupEventsByIsoDate(rows) {
      var g = {};
      for (var i = 0; i < rows.length; i++) {
        var k = String(rows[i].event_date || '').slice(0, 10);
        if (!g[k]) g[k] = [];
        g[k].push(rows[i]);
      }
      return g;
    }

    function timelineClipRange(tr) {
      if (!tr) return null;
      var ds = Math.max(tr.start, TL_START_MIN);
      var de = Math.min(tr.end, TL_END_MIN);
      if (de <= ds) return null;
      return { ds: ds, de: de };
    }

    function timelineEventPlainTitle(ev) {
      var league = String(ev.league_or_competition || '').trim();
      var curMain = String(ev.title || ev.opponent || '').trim() || '—';
      var timeStr = String(ev.kickoff_primary || ev.time || '').trim();
      var bits = [];

    function splitDayEventsForTimeline(dayEv) {
      var allDay = [];
      var timed = [];
      var provisional = [];
      for (var i = 0; i < dayEv.length; i++) {
        var ev = dayEv[i];
        var tr = parseTimeRangeMinutes(ev);
        if (!tr) {
          provisional.push(ev);
          continue;
        }
        var ds = Math.max(tr.start, TL_START_MIN);
        var de = Math.min(tr.end, TL_END_MIN);
        if (de <= ds) {
          if (tr.end > tr.start) {
            provisional.push(ev);
          } else {
            var p0 = Math.min(Math.max(tr.start, TL_START_MIN), TL_END_MIN - 30);
            timed.push({ ev: ev, clip: { ds: p0, de: p0 + 30 }, _provisional: true });
          }
          continue;
        }
        timed.push({ ev: ev, clip: { ds: ds, de: de } });
      }
      provisional.sort(function(a, b) {
        return eventDaySortKey(a) - eventDaySortKey(b) || String(a.id || '').localeCompare(String(b.id || ''));
      });
      var bottom = TL_END_MIN;
      for (var k = 0; k < provisional.length; k++) {
        var ev2 = provisional[k];
        var de2 = bottom;
        var ds2 = de2 - 30;
        if (ds2 < TL_START_MIN) ds2 = TL_START_MIN;
        if (de2 <= ds2) de2 = Math.min(ds2 + 30, TL_END_MIN);
        timed.push({ ev: ev2, clip: { ds: ds2, de: de2 }, _provisional: true });
        bottom = ds2;
      }
      return { allDay: allDay, timed: timed };
    }

    function assignTimelineLanes(timedItems) {
      timedItems.sort(function(a, b) {
        return a.clip.ds - b.clip.ds || a.clip.de - b.clip.de;
      });
      var laneEnds = [];
      var placements = [];
      for (var i = 0; i < timedItems.length; i++) {
        var it = timedItems[i];
        var lane = -1;
        for (var L = 0; L < laneEnds.length; L++) {
          if (laneEnds[L] <= it.clip.ds) {
            lane = L;
            laneEnds[L] = it.clip.de;
            break;
          }
        }
        if (lane < 0) {
          lane = laneEnds.length;
          laneEnds.push(it.clip.de);
        }
        placements.push({ item: it, lane: lane });
      }
      var maxLanes = Math.max(1, laneEnds.length);
      for (var j = 0; j < placements.length; j++) placements[j].lanes = maxLanes;
      return placements;
    }

    function buildTimedBlocksLayerHtml(placements) {
      var h = '<div class="tl-blocks-layer">';
      if (!placements.length) {
        h += '</div>';
        return h;
      }
      var maxLanes = placements[0].lanes;
      for (var p = 0; p < placements.length; p++) {
        var pl = placements[p];
        var ev = pl.item.ev;
        var clip = pl.item.clip;
        var topPct = (clip.ds - TL_START_MIN) / TL_TOTAL_MIN * 100;
        var hPct = Math.max((clip.de - clip.ds) / TL_TOTAL_MIN * 100, 0.9);
        var wPct = 100 / maxLanes;
        var leftPct = pl.lane * wPct;
        var rowCls = rowClass(ev);
        if (ev.__riskConflict) rowCls += (rowCls ? ' ' : '') + 'row-conflict';
        else if (ev.__riskNear) rowCls += (rowCls ? ' ' : '') + 'row-near';
        var mcls = (isVoidRow(ev) || isPastEventDate(ev)) ? ' tl-block--muted' : '';
        var prov = !!pl.item._provisional;
        var provCls = prov ? ' tl-block--provisional' : '';
        var lab = esc(timelineEventPlainTitle(ev));
        var titBase = timelineEventTitleAttr(ev);
        var tit = escAttr(titBase + (prov ? '（時刻なし・30分仮表示）' : ''));
        h += '<div class="tl-block' + (rowCls ? ' ' + rowCls : '') + provCls + mcls + '" style="top:' + topPct.toFixed(2) + '%;height:' + hPct.toFixed(2) + '%;left:' + (leftPct + 0.35).toFixed(2) + '%;width:' + (wPct - 0.7).toFixed(2) + '%" title="' + tit + '">';
        h += '<span class="tl-block-inner">' + lab + '</span></div>';
      }
      h += '</div>';
      return h;
    }

    function buildTimelineForDates(dateIsos, grouped, selectedYear) {
      var todayIso = todayIsoJst();
      var h = '<div class="tl-wrap"><div class="tl-scroll-inner">';
      h += '<div class="tl-header-row"><div class="tl-corner"><span class="tl-tz">JST</span></div>';
      for (var c = 0; c < dateIsos.length; c++) {
        var isoDate = dateIsos[c];
        var d = parseLocalDate(isoDate);
        var wd = d ? WEEKDAY_JA[d.getDay()] : '';
        var dom = d ? String(d.getDate()) : '';
        var isToday = todayIso && isoDate === todayIso;
        h += '<div class="tl-day-head' + (isToday ? ' tl-day-head--today' : '') + '"><span class="tl-dow">' + esc(wd) + '</span> <span class="tl-dom-wrap"><span class="tl-dom">' + esc(dom) + '</span></span></div>';
      }
      h += '</div>';
      h += '<div class="tl-allday-row"><div class="tl-gutter-spacer"></div>';
      for (var c2 = 0; c2 < dateIsos.length; c2++) {
        var iso2 = dateIsos[c2];
        var dayEv = grouped[iso2] || [];
        var sp = splitDayEventsForTimeline(dayEv);
        h += '<div class="tl-allday-cell">' + buildAllDayChipsFromList(sp.allDay) + '</div>';
      }
      h += '</div>';
      h += '<div class="tl-main-row">' + buildTimeRulerHTML() + '<div class="tl-days-strip">';
      for (var c3 = 0; c3 < dateIsos.length; c3++) {
        var iso3 = dateIsos[c3];
        var dayEv3 = grouped[iso3] || [];
        var sp3 = splitDayEventsForTimeline(dayEv3);
        var placements = assignTimelineLanes(sp3.timed);
        h += '<div class="tl-day-body" data-date="' + escAttr(iso3) + '">';
        h += buildTimedBlocksLayerHtml(placements);
        h += '</div>';
      }
      h += '</div></div></div></div>';
      return h;
    }

      var st = me.db_status || 'none';
      var msg = '';
      if (st === 'pending') msg = '審査待ちです。管理者の承認後、このページを再読み込みしてください。';
      else if (st === 'rejected') msg = '申請が却下されました。再申請できます。';
      else msg = 'このアプリの利用には承認が必要です。';
      el.innerHTML =
        '<div>' + esc(msg) + '</div>' +
        '<div style="margin-top:10px;">' +
        '<button type="button" class="btn btn-primary" id="btnRequestAccess">利用を申請する</button></div>';
      document.getElementById('btnRequestAccess').addEventListener('click', async function() {
        try {
          var res = await apiPostJson('/api/access/request', {});
          alert(res.already_granted ? 'すでに利用できます' : (res.message || '送信しました'));
          await refreshMeAndPanels();
        } catch (err) {
          alert(esc(String(err.message || err)));
        }
      });
    }

    async function refreshMeAndPanels() {
      var me = await apiGet('/auth/me');
      __lastMe = me;
      _cachedHeaderWithIds =
        'LINE: ' +
        (me.line_user_id || '').slice(0, 12) +
        (me.line_user_id && me.line_user_id.length > 12 ? '…' : '');
      if (me.display_name) _cachedHeaderWithIds += ' · ' + me.display_name;
      if (me.is_admin) _cachedHeaderWithIds += ' · 管理者';
      if (!me.access_granted) _cachedHeaderWithIds += ' · 未承認';
      var parts = [];
      if (me.display_name) parts.push(me.display_name);
      if (me.is_admin) parts.push('管理者');
      if (!me.access_granted) parts.push('未承認');
      _cachedHeaderNoIds = parts.length ? parts.join(' · ') : '—';
      updateMetaStrip(me);
      var tabAdmin = document.getElementById('tabAdmin');
      var tabPending = document.getElementById('tabPending');
      if (me.is_admin) {
        tabAdmin.hidden = false;
        if (tabPending) tabPending.hidden = false;
      } else {
        tabAdmin.hidden = true;
        if (tabPending) tabPending.hidden = true;
      }
      if ((currentView === 'admin' || currentView === 'pending') && !me.is_admin) {
        currentView = 'week';
        setViewTabsUI();
      }
      renderAccessPanel(me);
      return me;
    }

    async function boot() {
      bindIdentityIdsToggle();
      fillYearMonth();
      wireTabs();
      if (IS_DEV_BYPASS) {
        var banner = document.getElementById('dev-banner');
        if (banner) banner.style.display = 'block';
        fetchWithAuth('api/admin/dev-access-notify', { method: 'GET' }).catch(function() {});
      }
      try {
        await fetchConfig();
        applyVersionLabel();
        await ensureLiff();
        ensureGroupContext();
        document.getElementById('loading').textContent = '';
        var me = await refreshMeAndPanels();
        var wantAdmin = readUrlTab() === 'admin' && me.is_admin;
        var wantPending = readUrlTab() === 'pending' && me.is_admin;
        if (me.access_granted) {
          if (wantPending) {
            applyView('pending');
          } else if (wantAdmin) {
            applyView('admin');
          } else {
            await loadMonth();
          }
        } else {
          document.getElementById('viewContent').innerHTML =
            '<div class="empty">承認後にスケジュールが表示されます。上部の「利用を申請する」から申請してください。</div>';
        }
      } catch (e) {
        document.getElementById('viewContent').innerHTML = '<div class="error">ERR: ' + esc(String(e.message || e)) + '</div>';
      }
    }

    document.getElementById('btnLoad').addEventListener('click', function() {
      if (!__lastMe || !__lastMe.access_granted) {
        document.getElementById('viewContent').innerHTML = '<div class="error">利用が承認されていません</div>';
        return;
      }
      loadMonth().catch(function(e) {
        document.getElementById('viewContent').innerHTML = '<div class="error">' + esc(String(e.message || e)) + '</div>';
      });
    });

    document.getElementById('chkShowPastMonth').addEventListener('change', function() {
      _showPastEvents.month = !!this.checked;
      scheduleRerender();
    });
    document.getElementById('chkShowPastWeek').addEventListener('change', function() {
      if (currentView === 'week') _showPastEvents.week = !!this.checked;
      else if (currentView === 'weekend') _showPastEvents.weekend = !!this.checked;
      scheduleRerender();
    });

    boot();
  </script>
</body>
</html>
