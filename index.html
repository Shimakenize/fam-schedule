<!DOCTYPE html>

  <title>REGALIA</title>
  <!-- GitHub Actions トリガーテスト用コメント -->
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; background: #0f1419; color: #e5e7eb; }

    .header-user { font-size: 0.72rem; color: #93c5fd; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1; }
    .id-toggle-label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.68rem; color: #94a3b8; white-space: nowrap; user-select: none; flex-shrink: 0; }
    .id-toggle-label input { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
    .id-toggle-slider { width: 34px; height: 18px; border-radius: 9px; background: #374151; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .id-toggle-slider::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #e5e7eb; top: 2px; left: 2px; transition: transform 0.2s; }
    .id-toggle-label input:focus-visible + .id-toggle-slider { outline: 2px solid #2ed3c6; outline-offset: 2px; }
    .id-toggle-label input:checked + .id-toggle-slider { background: #0d9488; }
    .id-toggle-label input:checked + .id-toggle-slider::after { transform: translateX(16px); background: #fff; }

    .view-tab:hover { color: #e5e7eb; }

    .view-tab[hidden] { display: none !important; }
    .meta-strip { padding: 6px 16px; font-size: 0.72rem; color: #9ccce6; background: #0b1220; border-bottom: 1px solid #233041; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .field label { display: block; font-size: 0.82rem; color: #9ccce6; margin-bottom: 4px; }
    .field label.past-filter-label { display: flex; align-items: center; gap: 6px; margin-bottom: 0; cursor: pointer; min-height: 38px; }
    .field label.past-filter-label input { margin: 0; flex-shrink: 0; }
    .field select { padding: 8px 10px; border: 1px solid #2b4258; border-radius: 8px; background: #0b1220; color: #e5e7eb; font-size: 0.92rem; min-width: 110px; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.92rem; }
    .btn-primary { background: #2ed3c6; color: #06212b; font-weight: 700; }
    .table-wrap { padding: 14px 16px; overflow-x: auto; }
    .table-wrap-main { max-height: calc(100vh - 200px); overflow-y: auto; overflow-x: auto; }
    .data-table thead th { position: static; background: #0b1220; box-shadow: 0 1px 0 #233041; }
    .filter-strip {
      display: none; flex-wrap: nowrap; align-items: center; gap: 10px;

    }
    .filter-strip-filters {
      display: flex; flex-wrap: nowrap; align-items: center; gap: 10px;

    .filter-strip-actions {
      display: flex; flex-shrink: 0; align-items: center; gap: 6px;
      margin-left: auto;

    .filter-strip-status {

    .filter-strip-icon-btn {
      width: 38px; height: 38px; padding: 0; border: 1px solid #2b4258; border-radius: 8px;
      background: #0b1220; color: #2ed3c6; font-size: 1.15rem; font-weight: 700;
      cursor: pointer; flex-shrink: 0; line-height: 1; font-family: inherit;
      display: inline-flex; align-items: center; justify-content: center;

    .filter-strip-icon-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .filter-strip-icon-btn:active { transform: scale(0.96); }
    .filter-strip select, .filter-strip input {
      padding: 6px 10px; font-size: 0.85rem; border-radius: 8px; border: 1px solid #2b4258; background: #0b1220; color: #e5e7eb;

    .filter-strip .cat-filter-item {

    .filter-strip .cat-filter-item input[type="checkbox"] { accent-color: #2ed3c6; margin: 0; }
    .filter-strip .cat-filter-label { font-size: 0.62rem; letter-spacing: 0.01em; color: #94a3b8; }
    .filter-strip-select { min-width: 0; max-width: 42vw; }
    .filter-strip-input { flex: 1; min-width: 120px; max-width: 240px; }
    table.data-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .data-table th, .data-table td { border: 1px solid #233041; padding: 8px 10px; text-align: left; }
    .data-table th { background: #0b1220; color: #9ccce6; font-weight: 600; }
    tr.row-week-start td { border-top: 3px solid #2ed3c6; }
    tr.row-day-start td { border-top: 2px solid #2ed3c6; }
    tr.row-deleted td { opacity: 0.55; text-decoration: line-through; }
    tr.row-new td { box-shadow: inset 3px 0 0 #22c55e; }
    tr.row-changed td { box-shadow: inset 3px 0 0 #eab308; }
    tr.row-near td { background: #4a3b00; }
    tr.row-conflict td { background: #5a1d1d; }
    tr.row-off td { opacity: 0.72; background: #151c24; }
    /* OFF / 削除(履歴): 状態列以外は訂正線＋グレー */
    tr.row-void td:not(.col-status) {
      color: #6b7280;
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      background: #151c24;
    }
    tr.row-void td.col-status {
      color: #e5e7eb;
      text-decoration: none;
      background: #1a2332;
      line-height: 1.45;
      white-space: pre-line;
      font-size: 0.8rem;
    }
    /* 開催日が過去: グレーアウトのみ（訂正線なし）。row-void と併用時も線を消す */
    tr.row-past td:not(.col-status) {
      color: #6b7280;
      opacity: 0.9;
      background: #151c24;
      text-decoration: none !important;
    }
    tr.row-past td.col-status {
      color: #94a3b8;
      text-decoration: none;
      background: #1a2332;
      line-height: 1.45;
      white-space: pre-line;
      font-size: 0.8rem;
    }
    tr.row-past .title-league { color: #6b7280; }
    .cell-old {
      color: #6b7280;
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      margin-right: 6px;
    }
    .cell-new { color: #a7f3d0; font-weight: 500; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; }
    .badge-match { background: #1e3a5f; color: #bfdbfe; }

    .badge-gasshuku { background: #422006; color: #fde68a; }
    .badge-match-muted { background: #374151; color: #9ca3af; }
    .badge-adhoc-muted { background: #3f3f46; color: #a1a1aa; }
    .badge-tr-muted { background: #374151; color: #9ca3af; }
    .badge-trg-muted { background: #374151; color: #9ca3af; }
    .badge-juku-muted { background: #4a2f24; color: #d6d3d1; }
    .badge-private-muted { background: #3f3f46; color: #a1a1aa; }
    .badge-gasshuku-muted { background: #3f3f46; color: #a1a1aa; }
    .badge-pending-inline { background: #713f12; color: #fde68a; font-size: 0.65rem; vertical-align: middle; }
    .pending-inp { width: 100%; max-width: 100%; padding: 4px 6px; font-size: 0.8rem; border: 1px solid #2b4258; border-radius: 6px; background: #0b1220; color: #e5e7eb; box-sizing: border-box; }

    .admin-section-title { margin-top: 14px; font-weight: 700; }

    .btn-sm { padding: 4px 10px; font-size: 0.78rem; margin-right: 6px; }
    .btn-warn { background: #b45309; color: #fff; }

      color: transparent; cursor: pointer; padding: 0; font-size: 0.75rem; line-height: 1; font-family: inherit;
    }
    .todo-check--done { background: #2ed3c6; color: #06212b; font-weight: 800; }

    .todo-row-status { flex: 0 0 auto; min-width: 3.8em; font-size: 0.74rem; color: #5eead4; font-weight: 500; align-self: center; }
    .todo-empty { padding: 20px 8px; color: #94a3b8; font-size: 0.86rem; }
    .filter-strip.disabled { opacity: 0.45; pointer-events: none; }
    .week-block-title { font-size: 0.9rem; font-weight: 600; color: #9ccce6; margin: 16px 0 8px; padding: 0 16px; }
    .week-block-title:first-of-type { margin-top: 8px; }

    .data-table .th-filter-select, .data-table .th-filter-input {
      width: 100%; max-width: 160px; padding: 4px 6px; font-size: 0.78rem;
      border: 1px solid #2b4258; border-radius: 6px; background: #0b1220; color: #e5e7eb;
    }
    .data-table .th-filter-input { max-width: 220px; }

    .badge-cat-u13 { background: #4c1d95; color: #ede9fe; }
    .badge-cat-u14 { background: #1d4ed8; color: #dbeafe; }

    .title-league { font-size: 0.78rem; color: #9ccce6; margin-bottom: 3px; line-height: 1.35; }
    tr.row-void .title-league { color: #6b7280; }
    /* 週・週末: 表 / タイムライン切替 */
    .seg-toggle { display: inline-flex; border: 1px solid #2b4258; border-radius: 8px; overflow: hidden; }
    .seg-toggle .seg-btn {
      background: #0b1220; color: #94a3b8; border: none; padding: 8px 12px; font-size: 0.82rem; cursor: pointer; font-family: inherit;
    }
    .seg-toggle .seg-btn:hover { color: #e5e7eb; }
    .seg-toggle .seg-btn.active { background: #1e3a5f; color: #fff; font-weight: 600; }
    .tl-filter-chrome { margin-bottom: 4px; }

    .tl-root--fixed-cols { --tl-day-col: 150px; }

      while (d && end && d <= end) {
        out.push(toIsoDate(d));
        d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
      }
      return out;
    }

    function mergeEventsById(existing, incoming) {
      var map = {};
      for (var i = 0; i < existing.length; i++) {
        var a = existing[i];
        map[String(a.id)] = a;
      }
      for (var j = 0; j < incoming.length; j++) {
        var b = incoming[j];
        map[String(b.id)] = b;
      }
      var out = [];
      for (var k in map) {
        if (Object.prototype.hasOwnProperty.call(map, k)) out.push(map[k]);
      }
      out.sort(compareEventsByDateTimeId);
      return out;
    }

    async function fetchEventsRange(fromIso, toIso) {

    async function extendSchedulePrevWeek() {
      if (!__cachedMonthData || !__cachedMonthData.rangeFrom) return;
      var rf = __cachedMonthData.rangeFrom;
      var newFrom = addDaysIso(rf, -7);
      var endChunk = addDaysIso(rf, -1);
      var chunk = await fetchEventsRange(newFrom, endChunk);
      __cachedMonthData.events = mergeEventsById(__cachedMonthData.events || [], chunk.events || []);
      __cachedMonthData.rangeFrom = newFrom;
      __cachedMonthData.year = parseInt(newFrom.slice(0, 4), 10);
      __cachedMonthData.month = parseInt(newFrom.slice(5, 7), 10);
      scheduleRerender();
    }

    async function extendScheduleNextWeek() {
      if (!__cachedMonthData || !__cachedMonthData.rangeTo) return;
      var rt = __cachedMonthData.rangeTo;
      var newTo = addDaysIso(rt, 7);
      var startChunk = addDaysIso(rt, 1);
      var chunk = await fetchEventsRange(startChunk, newTo);
      __cachedMonthData.events = mergeEventsById(__cachedMonthData.events || [], chunk.events || []);
      __cachedMonthData.rangeTo = newTo;
      scheduleRerender();
    }

    async function loadScheduleInitial(silent) {
      if (currentView === 'pending' || currentView === 'admin' || currentView === 'todo') return;
      var t = todayIsoJst();
      if (!t) t = toIsoDate(new Date());
      var from = addDaysIso(t, -2);
      var to = addDaysIso(t, 14);
      if (!silent) document.getElementById('viewContent').innerHTML = '<div class="empty">読み込み中…</div>';
      var data = await fetchEventsRange(from, to);
      var evs = data.events || [];
      __cachedMonthData = {
        events: evs,
        holiday_isos: data.holiday_isos || [],
        year: parseInt(from.slice(0, 4), 10),
        month: parseInt(from.slice(5, 7), 10),
        rangeFrom: data.from || from,
        rangeTo: data.to || to
      };
      _saveScheduleCache(lineUserId, __cachedMonthData);
      updateToolbarForView();
      refreshScheduleView();
    }

    async function refreshScheduleCacheFromServer() {
      var t = todayIsoJst() || toIsoDate(new Date());
      var from = __cachedMonthData && __cachedMonthData.rangeFrom ? __cachedMonthData.rangeFrom : addDaysIso(t, -2);
      var to = __cachedMonthData && __cachedMonthData.rangeTo ? __cachedMonthData.rangeTo : addDaysIso(t, 28);
      var data = await fetchEventsRange(from, to);
      var evs = data.events || [];
      if (!__cachedMonthData) {
        __cachedMonthData = { events: [], year: 0, month: 1, rangeFrom: from, rangeTo: to };
      }
      __cachedMonthData.events = evs;
      __cachedMonthData.holiday_isos = data.holiday_isos || [];
      __cachedMonthData.rangeFrom = data.from || from;
      __cachedMonthData.rangeTo = data.to || to;
      __cachedMonthData.year = parseInt(String(__cachedMonthData.rangeFrom).slice(0, 4), 10);
      __cachedMonthData.month = parseInt(String(__cachedMonthData.rangeFrom).slice(5, 7), 10);
      if (currentView !== 'admin' && currentView !== 'pending' && currentView !== 'todo') {

    function parseLocalDate(dateStr) {
      var p = String(dateStr || '').split('-');
      if (p.length < 3) return null;
      return new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
    }

    function mondayKey(d) {
      if (!d) return '';
      var day = d.getDay();
      var off = day === 0 ? -6 : 1 - day;
      var m = new Date(d.getFullYear(), d.getMonth(), d.getDate() + off);
      return m.getFullYear() + '-' + pad2(m.getMonth() + 1) + '-' + pad2(m.getDate());
    }

    function toIsoDate(d) {
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    function todayIsoJst() {
      try {
        var parts = new Intl.DateTimeFormat('en-CA', {
          timeZone: 'Asia/Tokyo',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit'
        }).formatToParts(new Date());
        var y = '', m = '', d = '';
        for (var i = 0; i < parts.length; i++) {
          var t = parts[i].type;
          if (t === 'year') y = parts[i].value;
          if (t === 'month') m = parts[i].value;
          if (t === 'day') d = parts[i].value;
        }
        return y + '-' + m + '-' + d;
      } catch (e) {
        return '';
      }
    }

    /** JST の「今」を 0時からの分（0–1440付近）で返す */
    function nowMinutesJst() {
      try {
        var parts = new Intl.DateTimeFormat('en-GB', {
          timeZone: 'Asia/Tokyo',
          hour: '2-digit',
          minute: '2-digit',
          hourCycle: 'h23'
        }).formatToParts(new Date());
        var H = 0;
        var M = 0;
        for (var i = 0; i < parts.length; i++) {
          if (parts[i].type === 'hour') H = parseInt(parts[i].value, 10) || 0;
          if (parts[i].type === 'minute') M = parseInt(parts[i].value, 10) || 0;
        }
        return H * 60 + M;
      } catch (e) {
        return -1;
      }
    }

    function clearTimelineNowLineTimer() {
      if (__tlNowInterval) {
        clearInterval(__tlNowInterval);
        __tlNowInterval = null;
      }
    }

    function buildTimelineNowMarkerHtml(isoDate, todayIso, rangeStart, rangeEnd, rangeSpan) {
      if (!todayIso || isoDate !== todayIso) return '';
      var nowMin = nowMinutesJst();
      if (nowMin < 0) return '';
      if (nowMin < rangeStart || nowMin > rangeEnd) return '';
      var span = Math.max(1, rangeSpan);
      var topPct = (nowMin - rangeStart) / span * 100;
      return '<div class="tl-now-marker" style="top:' + topPct.toFixed(3) + '%" data-tl-now="1" aria-hidden="true"></div>';
    }

    function updateTimelineNowLineMarkers() {
      if (currentView !== 'timeline') {
        clearTimelineNowLineTimer();
        return;
      }
      var root = document.querySelector('.tl-root');
      if (!root) return;
      var rs = parseFloat(root.getAttribute('data-tl-range-start'), 10);
      var re = parseFloat(root.getAttribute('data-tl-range-end'), 10);
      var rsp = parseFloat(root.getAttribute('data-tl-range-span'), 10);
      if (isNaN(rs) || isNaN(re) || isNaN(rsp)) return;
      root.querySelectorAll('.tl-now-marker[data-tl-now="1"]').forEach(function(n) {
        n.remove();
      });
      var todayIso = todayIsoJst();
      var bodyToday = root.querySelector('.tl-day-body[data-date="' + todayIso + '"]');
      if (!bodyToday) return;
      var nowMin = nowMinutesJst();
      if (nowMin < 0 || nowMin < rs || nowMin > re) return;
      var topPct = (nowMin - rs) / Math.max(1, rsp) * 100;
      bodyToday.insertAdjacentHTML('beforeend',
        '<div class="tl-now-marker" style="top:' + topPct.toFixed(3) + '%" data-tl-now="1" aria-hidden="true"></div>');
    }

    function startTimelineNowLineTimer() {

    function normalizeTrgTrainingPatch(patch) {

    function formatMinutesHm(m) {
      m = Math.max(0, Math.min(24 * 60 - 1, Math.round(m)));
      return pad2(Math.floor(m / 60)) + ':' + pad2(m % 60);
    }

    /** 出発・集合がメインより前なら時刻順で「… · メイン」、それ以外は生の kickoff */
    function formatKickoffAssemblyThenMain(ev) {
      var raw = String(ev.kickoff_primary || ev.time || '').trim();
      if (!raw) return raw;
      var s1 = normalizeKickoffStripTR(raw);
      var core = parseTimeRangeMinutesCoreNormalized(ev);
      if (!core) return raw;
      if (isMatchTimelineSegEv(ev)) {
        var bits = [];
        var pms = matchCollectPreMarkers(s1, core.start);
        var pi;
        for (pi = 0; pi < pms.length; pi++) {
          bits.push(formatMinutesHm(pms[pi].m) + pms[pi].label);
        }
        bits.push(core.end > core.start
          ? (formatMinutesHm(core.start) + '-' + formatMinutesHm(core.end))
          : formatMinutesHm(core.start));
        var ptm = matchCollectPostMarkers(s1, core.end);
        for (pi = 0; pi < ptm.length; pi++) {
          bits.push(formatMinutesHm(ptm[pi].m) + ptm[pi].label);
        }
        return bits.join(' · ');
      }
      var disp = parseTimeRangeMinutesForDisplay(ev);
      if (!disp || disp.start >= core.start) return raw;
      var depMins = collectDepartureMinutesBefore(s1, core.start);
      var asmMins = collectShuGoMinutesBefore(s1, core.start);
      var depMin = depMins.length ? Math.min.apply(null, depMins) : null;
      var asmMin = asmMins.length ? Math.min.apply(null, asmMins) : null;
      if (depMin != null && asmMin != null && depMin === asmMin) asmMin = null;
      var parts = [];
      if (depMin != null) parts.push(formatMinutesHm(depMin) + '出発');
      if (asmMin != null) parts.push(formatMinutesHm(asmMin) + '集合');
      var mainStr = core.end > core.start
        ? (formatMinutesHm(core.start) + '-' + formatMinutesHm(core.end))
        : formatMinutesHm(core.start);
      parts.push(mainStr);
      return parts.join(' · ');
    }

    function timelineEventSubtitleInBlock(ev) {
      var league = String(ev.league_or_competition || '').trim();
      var curMain = timelineEventMainLabel(ev);
      if (isTimelineTrgEvent(ev) && league.toUpperCase() === 'TRG') league = '';
      if (league) return league + ' · ' + curMain;
      return curMain;

    function matchPreLabelsJoined(arr) {
      var parts = [];
      for (var i = 0; i < arr.length; i++) {
        parts.push(formatMinutesHm(arr[i].m) + arr[i].label);
      }
      return parts.join(' ');
    }

    /**
     * メイン直前の帯ほど match-pre1（濃）。上から i 番目 / 可視区間内の帯が n 本のとき
     * tier = min(3, max(1, n - i))（ロールではなく本番に近い順で 1→2→3）
     */
    function matchPreClassFromProximity(iFromTop, n) {
      if (n <= 0) return 'tl-block-seg--match-pre3';
      var tier = Math.min(3, Math.max(1, n - iFromTop));
      return 'tl-block-seg--match-pre' + tier;
    }

    /**
     * メイン直後の最初の帯ほど match-post1（濃）。遅いほど post2, post3（pre と同色・段階対応）
     */
    function matchPostClassFromProximity(iFromMain, n) {
      if (n <= 0) return 'tl-block-seg--match-post3';
      var tier = Math.min(3, Math.max(1, iFromMain + 1));
      return 'tl-block-seg--match-post' + tier;
    }

    /**
     * メイン前の1列分。lane=null なら全マーカー、false=選手側、true=観戦出発のみ。
     * メイン前: 各区間の始端 uq[s] のマーカー＝その行動の開始時刻。メイン後は別処理で終端＝終了時刻。
     */
    function buildMatchPreColumnStackedHtml(preMs, preTop, preBot, lane) {
      var filt = [];
      for (var fi = 0; fi < preMs.length; fi++) {
        if (lane == null) filt.push(preMs[fi]);
        else {
          var isSp = preMs[fi].role === 'spectate_dep';
          if (lane ? isSp : !isSp) filt.push(preMs[fi]);
        }
      }
      var earlyFilt = [];
      var j;
      for (j = 0; j < filt.length; j++) {
        if (filt[j].m < preTop) earlyFilt.push(filt[j]);
      }
      earlyFilt.sort(function(a, b) { return a.m - b.m || String(a.role).localeCompare(String(b.role)); });
      var earlyLab = matchPreLabelsJoined(earlyFilt);
      var h = '';
      var tp = [preTop];
      for (j = 0; j < filt.length; j++) {
        if (filt[j].m >= preTop && filt[j].m < preBot) tp.push(filt[j].m);
      }
      tp.push(preBot);
      tp.sort(function(x, y) { return x - y; });
      var uq = [];
      for (var u = 0; u < tp.length; u++) {
        if (u === 0 || tp[u] !== tp[u - 1]) uq.push(tp[u]);
      }
      var s, segA, segB, wMin, g, startM, atStartMark, pi, lab, cls, preRows;
      preRows = [];
      for (s = 0; s < uq.length - 1; s++) {
        segA = Math.max(uq[s], preTop);
        segB = Math.min(uq[s + 1], preBot);
        if (segB <= segA) continue;
        wMin = segB - segA;
        g = Math.max(1, wMin);
        startM = uq[s];
        atStartMark = [];
        for (pi = 0; pi < filt.length; pi++) {
          if (filt[pi].m === startM && startM >= preTop) atStartMark.push(filt[pi]);
        }
        lab = matchPreLabelsJoined(atStartMark);
        preRows.push({ g: g, lab: lab });
      }
      var earlySegs = earlyLab ? 1 : 0;
      var totalPre = earlySegs + preRows.length;
      var ri2;
      if (earlyLab) {
        cls = matchPreClassFromProximity(0, totalPre);
        h += '<div class="tl-block-seg ' + cls + '" style="flex:1 1 0;min-height:22px;max-height:40px">' + esc(earlyLab) + '</div>';
      }
      for (ri2 = 0; ri2 < preRows.length; ri2++) {
        cls = matchPreClassFromProximity(earlySegs + ri2, totalPre);
        h += '<div class="tl-block-seg ' + cls + '" style="flex:' + preRows[ri2].g + ' 1 0;min-height:0">' +
          esc(preRows[ri2].lab) + '</div>';
      }
      return h;
    }

    /** メイン後: 自宅車は保護者も共通のため全幅、自宅電車は選手のみ（左列） */
    function isMatchPostSharedJitakaCar(row) {
      return row && String(row.postLabel || '') === '自宅車';
    }

    /** 観戦出発のみの列。先頭〜最初の観戦マーカーまでは帯にせず透明スペーサ（保護者列の空ヘッダを出さない） */
    function buildMatchSpectatePreColumnHtml(preMs, preTop, preBot) {
      var sm = [];
      for (var si = 0; si < preMs.length; si++) {
        if (preMs[si].role === 'spectate_dep') sm.push(preMs[si]);
      }
      if (!sm.length) return '';
      sm.sort(function(a, b) { return a.m - b.m; });
      var h = '';
      var firstM = sm[0].m;
      var lead = Math.max(0, firstM - preTop);
      if (lead > 0) {
        h += '<div class="tl-match-spectate-lead-spacer" style="flex:' + lead + ' 1 0;min-height:0"></div>';
      }
      var sk, t0, t1, gSeg, labS, clsS, spRows, si2;
      spRows = [];
      for (sk = 0; sk < sm.length; sk++) {
        t0 = sm[sk].m;
        t1 = sk + 1 < sm.length ? sm[sk + 1].m : preBot;
        if (t1 <= t0) continue;
        gSeg = Math.max(1, t1 - t0);
        labS = formatMinutesHm(sm[sk].m) + sm[sk].label;
        spRows.push({ g: gSeg, lab: labS });
      }
      for (si2 = 0; si2 < spRows.length; si2++) {
        clsS = matchPreClassFromProximity(si2, spRows.length);
        h += '<div class="tl-block-seg ' + clsS + '" style="flex:' + spRows[si2].g + ' 1 0;min-height:0">' +
          esc(spRows[si2].lab) + '</div>';
      }
      return h;
    }

    /** 保護者列（右列）: spectate_dep マーカー + parent_time マーカーを統合して表示 */
    function buildParentRightPreColumnHtml(preMs, parentTimeMs, preTop, preBot) {
      var sm = [];
      var si, pi;
      for (si = 0; si < preMs.length; si++) {
        if (preMs[si].role === 'spectate_dep') sm.push({ m: preMs[si].m, label: preMs[si].label });
      }
      for (pi = 0; pi < parentTimeMs.length; pi++) {
        sm.push({ m: parentTimeMs[pi].m, label: parentTimeMs[pi].label });
      }
      if (!sm.length) return '';
      sm.sort(function(a, b) { return a.m - b.m; });
      var h = '';
      var firstM = sm[0].m;
      var lead = Math.max(0, firstM - preTop);
      if (lead > 0) {
        h += '<div class="tl-match-spectate-lead-spacer" style="flex:' + lead + ' 1 0;min-height:0"></div>';
      }
      var sk2, t0, t1, gSeg, labS, clsS, spRows2, si2;
      spRows2 = [];
      for (sk2 = 0; sk2 < sm.length; sk2++) {
        t0 = sm[sk2].m;
        t1 = sk2 + 1 < sm.length ? sm[sk2 + 1].m : preBot;
        if (t1 <= t0) continue;
        gSeg = Math.max(1, t1 - t0);
        labS = formatMinutesHm(sm[sk2].m) + sm[sk2].label;
        spRows2.push({ g: gSeg, lab: labS });
      }
      for (si2 = 0; si2 < spRows2.length; si2++) {
        clsS = matchPreClassFromProximity(si2, spRows2.length);
        h += '<div class="tl-block-seg ' + clsS + '" style="flex:' + spRows2[si2].g + ' 1 0;min-height:0">' +
          esc(spRows2[si2].lab) + '</div>';
      }
      return h;
    }

    /** 試合: §1.0.1 トークンに基づく積層（他種別は buildTimelineStackedInnerHtml 従来） */
    function buildMatchTimelineStackedInnerHtml(ev, clip) {
      if (!ev || !clip || clip.de <= clip.ds) return '';
      var core = parseTimeRangeMinutesCoreNormalized(ev);
      if (!core) return '';
      var s1 = normalizeKickoffStripTR(String(ev.kickoff_primary || ev.time || '').trim());
      // 分割済みフィールドがあれば前段・後段ソースとして優先する（後方互換）
      var preSource  = String(ev.kickoff_secondary || '').trim()
        ? normalizeKickoffStripTR(String(ev.kickoff_secondary).trim()) : s1;
      var postSource = String(ev.kickoff_post || '').trim()
        ? normalizeKickoffStripTR(String(ev.kickoff_post).trim()) : s1;
      var mainStart = core.start;
      var mainEnd = core.end;
      var preMs = matchCollectPreMarkers(preSource, mainStart);
      var postMs = matchCollectPostMarkers(postSource, mainEnd);
      var hasSpectateDep = false;
      for (var i = 0; i < preMs.length; i++) {
        if (preMs[i].role === 'spectate_dep') {
          hasSpectateDep = true;
          break;
        }
      }
      var parentTimeStr = String(ev.parent_time || '').trim();
      var parentTimeMs = [];
      if (parentTimeStr) {
        var ptFree = collectFreeformTimeLabels(parentTimeStr);
        for (var pti = 0; pti < ptFree.length; pti++) {
          if (ptFree[pti].m < mainStart) parentTimeMs.push(ptFree[pti]);
        }
      }
      var hasDualPre = hasSpectateDep || parentTimeMs.length > 0;
      var h = '<div class="tl-block-inner tl-block-inner--stack">';
      var hasAny = false;
      var segA, segB, wMin, g, cls, lab, mk, i, j, tp, uq, u, s;

      if (mainStart > clip.ds) {
        var preTop = Math.max(clip.ds, 0);
        var preBot = Math.min(mainStart, clip.de);
        if (preBot > preTop) {
          var totalPre = Math.max(1, preBot - preTop);
          if (hasDualPre) {
            h += '<div class="tl-match-pre-dual" style="flex:' + totalPre + ' 1 0;min-height:0">';
            h += '<div class="tl-match-pre-col">' + buildMatchPreColumnStackedHtml(preMs, preTop, preBot, false) + '</div>';
            h += '<div class="tl-match-pre-col">' + buildParentRightPreColumnHtml(preMs, parentTimeMs, preTop, preBot) + '</div>';
            h += '</div>';
          } else {
            h += buildMatchPreColumnStackedHtml(preMs, preTop, preBot, null);
          }
          hasAny = true;
        }
      }

      var mainS = Math.max(clip.ds, mainStart);
      var mainE = Math.min(clip.de, mainEnd);
      var mainMin = Math.max(0, mainE - mainS);
      var gMain = Math.max(1, mainMin);
      var mainTimeStr = core.end > core.start
        ? (formatMinutesHm(core.start) + '-' + formatMinutesHm(core.end))
        : formatMinutesHm(core.start);
      var sub = timelineEventSubtitleInBlock(ev);
      h += '<div class="tl-block-seg tl-block-seg--main" style="flex:' + gMain + ' 1 0;min-height:0">';
      h += '<div class="tl-block-seg-body">';
      h += '<span class="tl-block-seg-time">' + esc(mainTimeStr) + '</span>';
      if (sub) h += '<span class="tl-block-seg-sub">' + esc(sub) + '</span>';
      if (ev.venue) h += '<span class="tl-block-seg-venue">' + esc(ev.venue) + '</span>';
      h += '</div></div>';
      hasAny = true;

      /* メイン後: 区間終端 uq[s+1] のマーカー＝終了時刻。ラベル無し区間は前の帯にマージ（空の細枠を出さない） */
      if (mainEnd < clip.de && postMs.length) {
        tp = [Math.max(mainEnd, clip.ds)];
        for (j = 0; j < postMs.length; j++) {
          if (postMs[j].m > mainEnd && postMs[j].m < clip.de) tp.push(postMs[j].m);
        }
        tp.push(clip.de);
        tp.sort(function(x2, y2) { return x2 - y2; });
        uq = [];
        for (u = 0; u < tp.length; u++) {
          if (u === 0 || tp[u] !== tp[u - 1]) uq.push(tp[u]);
        }
        var postRows = [];
        var pendingLead = 0;
        for (s = 0; s < uq.length - 1; s++) {
          segA = Math.max(uq[s], clip.ds, mainEnd);
          segB = Math.min(uq[s + 1], clip.de);
          if (segB <= segA) continue;
          wMin = segB - segA;
          g = Math.max(1, wMin);
          mk = null;
          for (j = 0; j < postMs.length; j++) {
            if (postMs[j].m === uq[s + 1]) { mk = postMs[j]; break; }
          }
          lab = mk ? (formatMinutesHm(mk.m) + mk.label) : '';
          if (!lab) {
            if (postRows.length) postRows[postRows.length - 1].g += g;
            else pendingLead += g;
            continue;
          }
          postRows.push({ g: g + pendingLead, lab: lab, postLabel: mk.label });
          pendingLead = 0;
        }
        if (pendingLead > 0 && postRows.length) postRows[postRows.length - 1].g += pendingLead;
        var pr, rw, pCls, chunks, curNarrow, chi, ch, ls, idxClr, postRi;
        if (hasSpectateDep) {
          chunks = [];
          curNarrow = [];
          for (pr = 0; pr < postRows.length; pr++) {
            rw = postRows[pr];
            if (isMatchPostSharedJitakaCar(rw)) {
              if (curNarrow.length) {
                chunks.push({ type: 'dual', rows: curNarrow });
                curNarrow = [];
              }
              chunks.push({ type: 'wide', row: rw });
            } else {
              curNarrow.push(rw);
            }
          }
          if (curNarrow.length) chunks.push({ type: 'dual', rows: curNarrow });
          postRi = 0;
          for (chi = 0; chi < chunks.length; chi++) {
            ch = chunks[chi];
            if (ch.type === 'dual') {
              ls = 0;
              for (idxClr = 0; idxClr < ch.rows.length; idxClr++) ls += ch.rows[idxClr].g;
              ls = Math.max(1, ls);
              h += '<div class="tl-match-pre-dual" style="flex:' + ls + ' 1 0;min-height:0">';
              h += '<div class="tl-match-pre-col">';
              for (idxClr = 0; idxClr < ch.rows.length; idxClr++) {
                rw = ch.rows[idxClr];
                pCls = matchPostClassFromProximity(postRi, postRows.length);
                postRi++;
                h += '<div class="tl-block-seg ' + pCls + '" style="flex:' + rw.g + ' 1 0;min-height:0">' + esc(rw.lab) + '</div>';
              }
              h += '</div>';
              h += '<div class="tl-match-pre-col"><div class="tl-match-post-rail-spacer" aria-hidden="true"></div></div>';
              h += '</div>';
            } else {
              rw = ch.row;
              pCls = matchPostClassFromProximity(postRi, postRows.length);
              postRi++;
              h += '<div class="tl-block-seg ' + pCls + ' tl-block-seg--match-post-wide" style="flex:' + rw.g + ' 1 0;min-height:0">' + esc(rw.lab) + '</div>';
            }
          }
        } else {
          for (pr = 0; pr < postRows.length; pr++) {
            rw = postRows[pr];
            pCls = matchPostClassFromProximity(pr, postRows.length);
            h += '<div class="tl-block-seg ' + pCls + '" style="flex:' + rw.g + ' 1 0;min-height:0">' + esc(rw.lab) + '</div>';
          }
        }
        hasAny = true;
      } else if (mainEnd < clip.de) {
        segA = Math.max(mainEnd, clip.ds);
        segB = clip.de;
        if (segB > segA) {
          g = Math.max(1, segB - segA);
          h += '<div class="tl-block-seg tl-block-seg--match-post3" style="flex:' + g + ' 1 0;min-height:0"></div>';
          hasAny = true;
        }
      }

      h += '</div>';
      return hasAny ? h : '';
    }

    /**
     * 出発→集合→本番（時刻順）。解散は本番末尾の tail のみ。別レーンの枠にはしない。
     */
    function buildTimelineStackedInnerHtml(ev, clip) {
      if (!ev || !clip || clip.de <= clip.ds) return '';
      if (isMatchTimelineSegEv(ev)) {
        return buildMatchTimelineStackedInnerHtml(ev, clip);
      }
      var core = parseTimeRangeMinutesCoreNormalized(ev);
      if (!core) return '';
      var s1 = normalizeKickoffStripTR(String(ev.kickoff_primary || ev.time || '').trim());
      // 分割済みフィールドがあれば前段ソースとして優先する（後方互換）
      var preSource = String(ev.kickoff_secondary || '').trim()
        ? normalizeKickoffStripTR(String(ev.kickoff_secondary).trim()) : s1;
      var mainStart = core.start;
      var mainEnd = core.end;
      var dm = parseDismissalMinute(ev);
      var dismissStr = dm == null ? '' : (formatMinutesHm(dm) + '解散');

      var depMins = collectDepartureMinutesBefore(preSource, mainStart);
      var asmMins = collectShuGoMinutesBefore(preSource, mainStart);
      var depMin = depMins.length ? Math.min.apply(null, depMins) : null;
      var asmMin = asmMins.length ? Math.min.apply(null, asmMins) : null;
      if (depMin != null && asmMin != null && depMin === asmMin) asmMin = null;

      var innerPts = [];
      if (depMin != null && depMin < mainStart) innerPts.push({ t: depMin, ty: 'dep' });
      if (asmMin != null && asmMin < mainStart) innerPts.push({ t: asmMin, ty: 'asm' });
      innerPts.sort(function(a, b) {
        if (a.t !== b.t) return a.t - b.t;
        return a.ty === 'dep' ? -1 : 1;
      });

      var mainS = Math.max(clip.ds, mainStart);
      var mainE = Math.min(clip.de, mainEnd);
      var mainMin = Math.max(0, mainE - mainS);

      var h = '<div class="tl-block-inner tl-block-inner--stack">';
      var hasPre = false;
      for (var j = 0; j < innerPts.length; j++) {
        var segStart = j === 0 ? clip.ds : innerPts[j].t;
        var segEnd = Math.min(clip.de, (j + 1 < innerPts.length ? innerPts[j + 1].t : mainStart));
        if (segEnd <= segStart) continue;
        var smin = segEnd - segStart;
        var g = Math.max(1, smin);
        var lab = innerPts[j].ty === 'dep'
          ? (formatMinutesHm(innerPts[j].t) + '出発')
          : (formatMinutesHm(innerPts[j].t) + '集合');
        var cls = innerPts[j].ty === 'dep' ? 'tl-block-seg--departure' : 'tl-block-seg--assembly';
        h += '<div class="tl-block-seg ' + cls + '" style="flex:' + g + ' 1 0;min-height:0">' + esc(lab) + '</div>';
        hasPre = true;
      }

      if (!hasPre && !dismissStr && mainMin <= 0) return '';

      var gMain = Math.max(1, mainMin);
      var mainTimeStr = core.end > core.start
        ? (formatMinutesHm(core.start) + '-' + formatMinutesHm(core.end))
        : formatMinutesHm(core.start);
      var sub = timelineEventSubtitleInBlock(ev);
      h += '<div class="tl-block-seg tl-block-seg--main" style="flex:' + gMain + ' 1 0;min-height:0">';
      h += '<div class="tl-block-seg-body">';
      h += '<span class="tl-block-seg-time">' + esc(mainTimeStr) + '</span>';
      if (sub) h += '<span class="tl-block-seg-sub">' + esc(sub) + '</span>';
      if (ev.venue) h += '<span class="tl-block-seg-venue">' + esc(ev.venue) + '</span>';
      h += '</div>';
      if (dismissStr) h += '<span class="tl-block-seg-tail">' + esc(dismissStr) + '</span>';
      h += '</div></div>';
      return h;
    }

    function pointerYToTimelineMinutes(dayBody, clientY) {
      var root = dayBody.closest('.tl-root');
      if (!root) return null;
      var rs = parseFloat(root.getAttribute('data-tl-range-start'), 10);
      var rsp = parseFloat(root.getAttribute('data-tl-range-span'), 10);
      if (isNaN(rs) || isNaN(rsp) || rsp <= 0) return null;
      var rect = dayBody.getBoundingClientRect();
      if (rect.height <= 0) return null;
      var ratio = (clientY - rect.top) / rect.height;
      ratio = Math.max(0, Math.min(1, ratio));
      return Math.round(rs + ratio * rsp);
    }

    function roundMinutesToHalfHour(mins) {
      return Math.round(mins / 30) * 30;
    }

    var __tlLP = { timer: null, pid: null, x: 0, y: 0, el: null };
    var TL_LP_MS = 520;
    var TL_LP_MOVE2 = 144;

    function __clearTlLongPress() {
      if (__tlLP.timer) {
        clearTimeout(__tlLP.timer);
        __tlLP.timer = null;
      }
      __tlLP.pid = null;
      __tlLP.el = null;
    }

    function __onTlPointerDown(e) {
      if (currentView !== 'timeline') return;
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      var vc = document.getElementById('viewContent');
      var blockOrChip = e.target && e.target.closest && e.target.closest('.tl-block, .tl-chip');
      if (blockOrChip && vc.contains(blockOrChip)) {
        __clearTlLongPress();
        __tlLP.pid = e.pointerId;
        __tlLP.el = blockOrChip;
        __tlLP.x = e.clientX;
        __tlLP.y = e.clientY;
        var selfEl = blockOrChip;
        __tlLP.timer = setTimeout(function() {
          __tlLP.timer = null;
          __tlLP.pid = null;
          __tlLP.el = null;
          try {
            if (navigator.vibrate) navigator.vibrate(10);
          } catch (err) {}
          showTimelineDetailFromElement(selfEl);
        }, TL_LP_MS);
        return;
      }
      var dayBody = e.target && e.target.closest && e.target.closest('.tl-day-body');
      if (!dayBody || !vc.contains(dayBody)) return;
      if (!__lastMe || !__lastMe.access_granted) return;
      __clearTlLongPress();
      __tlLP.pid = e.pointerId;
      __tlLP.el = dayBody;
      __tlLP.x = e.clientX;
      __tlLP.y = e.clientY;
      var selfBody = dayBody;
      var startY = e.clientY;
      __tlLP.timer = setTimeout(function() {
        __tlLP.timer = null;
        __tlLP.pid = null;
        __tlLP.el = null;
        try {
          if (navigator.vibrate) navigator.vibrate(10);
        } catch (err) {}
        showTimelineCreateFromSlot(selfBody, startY);
      }, TL_LP_MS);
    }

    function __onTlPointerMove(e) {
      if (__tlLP.pid !== e.pointerId || !__tlLP.el) return;
      var dx = e.clientX - __tlLP.x;
      var dy = e.clientY - __tlLP.y;
      if (dx * dx + dy * dy > TL_LP_MOVE2) __clearTlLongPress();
    }

    function __onTlPointerUp(e) {
      if (__tlLP.pid === e.pointerId) __clearTlLongPress();
    }

    function __onTlContextMenu(e) {

    function timelineKindClass(ev) {
      var k = canonicalEventKind(ev.event_kind);
      if (k === 'adhoc') return 'tl-kind-adhoc';
      if (k === 'TR') return 'tl-kind-tr';
      if (k === '塾') return 'tl-kind-juku';
      if (k === '私用') return 'tl-kind-private';
      if (k === '合宿') return 'tl-kind-gasshuku';
      if (k === 'マリノス戦') return 'tl-kind-marinos';
      return 'tl-kind-match';
    }

    /** タイムライン表示窓の算出用。6–22 枠に収める前の生の開始・終了（分） */
    function collectTimelineRawMinMax(dateIsos, grouped) {
      var gmin = null;
      var gmax = null;
      for (var i = 0; i < dateIsos.length; i++) {
        var dayEv = grouped[dateIsos[i]] || [];
        for (var j = 0; j < dayEv.length; j++) {
          var tr = parseTimeRangeMinutesForDisplay(dayEv[j]);
          if (!tr) continue;
          if (gmin === null || tr.start < gmin) gmin = tr.start;
          if (gmax === null || tr.end > gmax) gmax = tr.end;
        }
      }
      return { gmin: gmin, gmax: gmax };
    }

    function computeTimelineViewWindow(dateIsos, grouped) {
      var pad = 45;
      var abs0 = TL_START_MIN;
      var abs1 = TL_END_MIN;
      var mm = collectTimelineRawMinMax(dateIsos, grouped);
      var gmin = mm.gmin;
      var gmax = mm.gmax;
      if (gmin === null) {
        return { rangeStart: abs0, rangeEnd: abs1, rangeSpan: abs1 - abs0, slotPx: 40 };
      }
      var rangeStart = Math.min(abs0, gmin - pad);
      var rangeEnd = Math.max(abs1, gmax + pad);
      rangeStart = Math.max(0, Math.floor(rangeStart / 30) * 30);
      rangeEnd = Math.ceil(rangeEnd / 30) * 30;
      if (rangeEnd <= rangeStart) rangeEnd = rangeStart + 120;
      var rangeSpan = rangeEnd - rangeStart;
      var slots = Math.max(1, rangeSpan / 30);
      var slotPx = 640 / slots;
      return { rangeStart: rangeStart, rangeEnd: rangeEnd, rangeSpan: rangeSpan, slotPx: slotPx };
    }

    /** rangeStartMin / rangeEndMin は表示窓（省略時は 6:00–22:00） */
    function splitDayEventsForTimeline(dayEv, rangeStartMin, rangeEndMin) {
      var rs = rangeStartMin != null ? rangeStartMin : TL_START_MIN;
      var re = rangeEndMin != null ? rangeEndMin : TL_END_MIN;
      var allDay = [];
      var timed = [];
      var provisional = [];
      for (var i = 0; i < dayEv.length; i++) {
        var ev = dayEv[i];
        var tr = parseTimeRangeMinutesForDisplay(ev);
        if (!tr) {
          provisional.push(ev);
          continue;
        }
        var ds = Math.max(tr.start, rs);
        var de = Math.min(tr.end, re);
        if (de <= ds) {
          if (tr.end > tr.start) {
            provisional.push(ev);
          } else {
            var p0 = Math.min(Math.max(tr.start, rs), re - 30);
            timed.push({ ev: ev, clip: { ds: p0, de: p0 + 30 }, _provisional: true });
          }
          continue;
        }
        timed.push({ ev: ev, clip: { ds: ds, de: de } });
      }
      provisional.sort(function(a, b) {
        return eventDaySortKey(a) - eventDaySortKey(b) || String(a.id || '').localeCompare(String(b.id || ''));
      });
      var bottom = re;
      for (var k = 0; k < provisional.length; k++) {
        var ev2 = provisional[k];
        var de2 = bottom;
        var ds2 = de2 - 30;
        if (ds2 < rs) ds2 = rs;
        if (de2 <= ds2) de2 = Math.min(ds2 + 30, re);
        timed.push({ ev: ev2, clip: { ds: ds2, de: de2 }, _provisional: true });
        bottom = ds2;
      }
      return { allDay: allDay, timed: timed };
    }

    function assignTimelineLanes(timedItems) {
      timedItems.sort(function(a, b) {
        return a.clip.ds - b.clip.ds || a.clip.de - b.clip.de;
      });
      var laneEnds = [];
      var placements = [];
      for (var i = 0; i < timedItems.length; i++) {
        var it = timedItems[i];
        var lane = -1;
        for (var L = 0; L < laneEnds.length; L++) {
          if (laneEnds[L] <= it.clip.ds) {
            lane = L;
            laneEnds[L] = it.clip.de;
            break;
          }
        }
        if (lane < 0) {
          lane = laneEnds.length;
          laneEnds.push(it.clip.de);
        }
        placements.push({ item: it, lane: lane });
      }
      var maxLanes = Math.max(1, laneEnds.length);
      for (var j = 0; j < placements.length; j++) placements[j].lanes = maxLanes;
      return placements;
    }

    /**
     * 同時重なりの連結グループごとに lane を割り当てる。
     * これにより、別時間帯の予定が過剰に細くなるのを防ぐ。
     */
    function assignTimelineLanesByGroup(timedItems) {
      if (!timedItems || !timedItems.length) return [];

      var normal  = timedItems.filter(function(it) { return it.ev.event_kind !== 'マリノス戦'; });
      var marinos = timedItems.filter(function(it) { return it.ev.event_kind === 'マリノス戦'; });

      var sorted = normal.slice().sort(function(a, b) {
        return a.clip.ds - b.clip.ds || a.clip.de - b.clip.de;
      });
      var groups = [];
      var cur = [];
      var curMaxEnd = -1;
      for (var i = 0; i < sorted.length; i++) {
        var it = sorted[i];
        if (!cur.length) {
          cur.push(it);
          curMaxEnd = it.clip.de;
          continue;
        }
        if (it.clip.ds < curMaxEnd) {
          cur.push(it);
          if (it.clip.de > curMaxEnd) curMaxEnd = it.clip.de;
          continue;
        }
        groups.push(cur);
        cur = [it];
        curMaxEnd = it.clip.de;
      }
      if (cur.length) groups.push(cur);

      var out = [];
      for (var g = 0; g < groups.length; g++) {
        var placed = assignTimelineLanes(groups[g]);
        for (var p = 0; p < placed.length; p++) out.push(placed[p]);
      }

      for (var m = 0; m < marinos.length; m++) {
        var mit = marinos[m];
        var overlapsNormal = normal.some(function(nit) {
          return nit.clip.ds < mit.clip.de && nit.clip.de > mit.clip.ds;
        });
        if (overlapsNormal) {
          out.push({ item: mit, lane: 0, lanes: 1, _marinosOverlay: true });
        } else {
          out.push({ item: mit, lane: 0, lanes: 1 });
        }
      }
      return out;
    }

    function buildTimedBlocksLayerHtml(placements, rangeStart, rangeSpan) {
      var h = '<div class="tl-blocks-layer">';
      if (!placements.length) {
        h += '</div>';
        return h;
      }
      var span = Math.max(1, rangeSpan);
      var marinosOverlays = placements.filter(function(pl) { return !!pl._marinosOverlay; });
      for (var p = 0; p < placements.length; p++) {
        var pl = placements[p];
        var ev = pl.item.ev;
        var clip = pl.item.clip;
        var topPct = (clip.ds - rangeStart) / span * 100;
        var hPct = Math.max((clip.de - clip.ds) / span * 100, 0.9);
        var laneCount = Math.max(1, pl.lanes || 1);
        var wPct = 100 / laneCount;
        var leftPct = pl.lane * wPct;
        var rowCls = rowClass(ev);
        var mcls = (isVoidRow(ev) || isPastEventDate(ev)) ? ' tl-block--muted' : '';
        var prov = !!pl.item._provisional;
        var provCls = prov ? ' tl-block--provisional' : '';
        var kcls = timelineKindClass(ev);
        var lab = esc(timelineEventPlainTitle(ev));
        var titBase = timelineEventTitleAttr(ev);
        var tit = escAttr(titBase + (prov ? '（時刻なし・30分仮表示）' : ''));
        var bSpan = clip.de - clip.ds;
        var stackedInner = (!prov && bSpan > 0) ? buildTimelineStackedInnerHtml(ev, clip) : '';
        var useStack = stackedInner !== '';
        var stackCls = useStack ? ' tl-block--stacked' : '';
        var emHtml = '';
        if (!useStack && bSpan > 0) {
          var aSegs = findAssemblyShadeSegmentInClip(ev, clip.ds, clip.de);
          for (var ai = 0; ai < aSegs.length; ai++) {
            var ag = aSegs[ai];
            var aTop = (ag.ds - clip.ds) / bSpan * 100;
            var aH = (ag.de - ag.ds) / bSpan * 100;
            if (aH > 0.08) {
              emHtml += '<span class="tl-block-em tl-block-em--assembly" style="top:' + aTop.toFixed(2) + '%;height:' + aH.toFixed(2) + '%"></span>';
            }
          }
          if (eventDateOnOrAfterTodayJst(ev)) {
            var kSegs = findKoShadeSegmentsInClip(String(ev.kickoff_primary || ev.time || ''), clip.ds, clip.de);
            for (var ki = 0; ki < kSegs.length; ki++) {
              var sg = kSegs[ki];
              var emTop = (sg.ds - clip.ds) / bSpan * 100;
              var emH = (sg.de - sg.ds) / bSpan * 100;
              if (emH > 0.08) {
                emHtml += '<span class="tl-block-em tl-block-em--ko" style="top:' + emTop.toFixed(2) + '%;height:' + emH.toFixed(2) + '%"></span>';
              }
            }
          }
        }
        var isMarinos = !!pl._marinosOverlay;
        var MARINOS_RESERVE = 48;
        var overlapsMarinosOv = !isMarinos && marinosOverlays.some(function(mpl) {
          return mpl.item.clip.ds < clip.de && mpl.item.clip.de > clip.ds;
        });
        var blockStyle;
        if (isMarinos) {
          blockStyle = 'top:' + topPct.toFixed(2) + '%;height:' + hPct.toFixed(2) + '%;right:0.5%;width:46px;';
        } else if (overlapsMarinosOv) {
          blockStyle = 'top:' + topPct.toFixed(2) + '%;height:' + hPct.toFixed(2) + '%;'
            + 'left:calc((100% - ' + MARINOS_RESERVE + 'px) * ' + pl.lane + ' / ' + laneCount + ' + 2px);'
            + 'width:calc((100% - ' + MARINOS_RESERVE + 'px) / ' + laneCount + ' - 4px);';
        } else {
          blockStyle = 'top:' + topPct.toFixed(2) + '%;height:' + hPct.toFixed(2) + '%;left:' + (leftPct + 0.35).toFixed(2) + '%;width:' + (wPct - 0.7).toFixed(2) + '%;';
        }
        if (isMarinos) {
          h += '<div class="tl-block ' + kcls + ' tl-block--marinos-compact' + (rowCls ? ' ' + rowCls : '') + mcls + '" data-tl-ev-id="' + escAttr(String(ev.id || '')) + '" style="' + blockStyle + '" title="' + tit + '">';
          h += '<span class="tl-block-inner">' + esc(marinosCompactLabel(ev)) + '</span></div>';
        } else {
          h += '<div class="tl-block ' + kcls + stackCls + (rowCls ? ' ' + rowCls : '') + provCls + mcls + '" data-tl-ev-id="' + escAttr(String(ev.id || '')) + '" style="' + blockStyle + '" title="' + tit + '">';
          if (useStack) {
            h += stackedInner + '</div>';
          } else {
            h += emHtml + '<span class="tl-block-inner">' + lab + '</span></div>';
          }
        }
      }
      h += '</div>';
      return h;
    }

    function buildAllDayChipsFromList(events) {
      if (!events.length) return '';
      var h = '';
      for (var i = 0; i < events.length; i++) {
        var ev = events[i];
        var m = (isVoidRow(ev) || isPastEventDate(ev)) ? ' tl-chip--muted' : '';
        h += '<div class="tl-chip' + m + '" data-tl-ev-id="' + escAttr(String(ev.id || '')) + '" title="' + escAttr(timelineEventTitleAttr(ev)) + '">' + esc(timelineEventPlainTitle(ev)) + '</div>';
      }
      return h;
    }

    function buildTimeRulerHTML(rangeStart, rangeEnd) {
      var h = '<div class="tl-time-ruler">';
      var span = Math.max(1, rangeEnd - rangeStart);
      var h0 = Math.floor(rangeStart / 60);
      var h1 = Math.ceil(rangeEnd / 60);
      for (var hour = h0; hour <= h1; hour++) {
        var tmin = hour * 60;
        var pct = (tmin - rangeStart) / span * 100;
        if (pct < -0.5 || pct > 100.5) continue;
        h += '<span class="tl-hlab" style="top:' + Math.max(0, Math.min(100, pct)).toFixed(2) + '%">' + esc(pad2(hour) + ':00') + '</span>';
      }
      h += '</div>';
      return h;
    }

    function buildTimelineDayHeadCellsHtml(dateIsos, todayIso, wideSet) {
      var h = '';
      for (var c = 0; c < dateIsos.length; c++) {
        var isoDate = dateIsos[c];
        var d = parseLocalDate(isoDate);
        var wd = d ? WEEKDAY_JA[d.getDay()] : '';
        var dom = d ? String(d.getDate()) : '';
        var isToday = todayIso && isoDate === todayIso;
        var isWide = wideSet && wideSet.has(isoDate);
        h += '<div class="tl-day-head' + (isToday ? ' tl-day-head--today' : '') + '"' + (isWide ? ' data-wide' : '') + '><span class="tl-dow">' + esc(wd) + '</span> <span class="tl-dom-wrap"><span class="tl-dom">' + esc(dom) + '</span></span></div>';
      }
      return h;
    }

    function buildTimelineForDates(dateIsos, grouped, selectedYear, scrollWrapId, holidayIsos) {
      var todayIso = todayIsoJst();
      var tw = computeTimelineViewWindow(dateIsos, grouped);
      var rs = tw.rangeStart;
      var re = tw.rangeEnd;
      var slotPx = tw.slotPx || 40;
      var wrapId = scrollWrapId ? ' id="' + escAttr(String(scrollWrapId)) + '"' : '';
      var holidaySet = new Set(holidayIsos || []);
      var wideSet = new Set();
      for (var wi = 0; wi < dateIsos.length; wi++) {
        var wiso = dateIsos[wi];
        var wd2 = parseLocalDate(wiso);
        if (wd2) {
          var dow = wd2.getDay();
          if (dow === 0 || dow === 6 || holidaySet.has(wiso)) wideSet.add(wiso);
        }
      }
      var h = '<div class="tl-root tl-root--fixed-cols tl-root--split" data-tl-range-start="' + escAttr(String(tw.rangeStart)) + '" data-tl-range-end="' + escAttr(String(tw.rangeEnd)) + '" data-tl-range-span="' + escAttr(String(tw.rangeSpan)) + '">';
      h += '<div class="tl-left-rail"><div class="tl-corner"><span class="tl-tz">JST</span></div>';
      h += '<div class="tl-left-rail-spacer"></div>';
      h += buildTimeRulerHTML(tw.rangeStart, tw.rangeEnd);
      h += '<div class="tl-left-rail-footer-spacer" aria-hidden="true"></div>';
      h += '</div>';
      h += '<div class="tl-wrap"' + wrapId + '><div class="tl-scroll-inner">';
      h += '<div class="tl-header-row">' + buildTimelineDayHeadCellsHtml(dateIsos, todayIso, wideSet) + '</div>';
      h += '<div class="tl-allday-row">';
      for (var c2 = 0; c2 < dateIsos.length; c2++) {
        var iso2 = dateIsos[c2];
        var dayEv = grouped[iso2] || [];
        var sp = splitDayEventsForTimeline(dayEv, rs, re);
        h += '<div class="tl-allday-cell"' + (wideSet.has(iso2) ? ' data-wide' : '') + '>' + buildAllDayChipsFromList(sp.allDay) + '</div>';
      }
      h += '</div>';
      h += '<div class="tl-main-row"><div class="tl-days-strip">';
      for (var c3 = 0; c3 < dateIsos.length; c3++) {
        var iso3 = dateIsos[c3];
        var dayEv3 = grouped[iso3] || [];
        var sp3 = splitDayEventsForTimeline(dayEv3, rs, re);
        var placements = assignTimelineLanesByGroup(sp3.timed);
        h += '<div class="tl-day-body" data-date="' + escAttr(iso3) + '"' + (wideSet.has(iso3) ? ' data-wide' : '') + ' style="--tl-slot:' + slotPx.toFixed(2) + 'px">';
        h += buildTimedBlocksLayerHtml(placements, tw.rangeStart, tw.rangeSpan);
        h += buildTimelineNowMarkerHtml(iso3, todayIso, tw.rangeStart, tw.rangeEnd, tw.rangeSpan);
        h += '</div>';
      }
      h += '</div></div>';
      h += '<div class="tl-footer-row" aria-hidden="true">' + buildTimelineDayHeadCellsHtml(dateIsos, todayIso, wideSet) + '</div>';
      h += '</div></div></div>';
      return h;
    }

    function scrollTimelineMonthToToday() {
      var wrap = document.getElementById('tlMonthScroll');
      if (!wrap) return;
      var head = wrap.querySelector('.tl-day-head--today');
      if (!head) return;
      var headCenter = head.getBoundingClientRect().left + head.getBoundingClientRect().width / 2;
      var box = wrap.getBoundingClientRect();
      var targetScroll = wrap.scrollLeft + (headCenter - (box.left + box.width / 2));
      wrap.scrollLeft = Math.max(0, Math.round(targetScroll));
    }

    function scrollTimelineMonthToDate(isoDate) {
      var wrap = document.getElementById('tlMonthScroll');
      if (!wrap) return;
      var d = String(isoDate || '').trim();
      if (d.length < 10) {
        scrollTimelineMonthToToday();
        return;
      }
      d = d.slice(0, 10);
      var cell = wrap.querySelector('.tl-day-body[data-date="' + d + '"]');
      if (!cell) {
        scrollTimelineMonthToToday();
        return;
      }
      var cellCenter = cell.getBoundingClientRect().left + cell.getBoundingClientRect().width / 2;
      var box = wrap.getBoundingClientRect();
      var targetScroll = wrap.scrollLeft + (cellCenter - (box.left + box.width / 2));
      wrap.scrollLeft = Math.max(0, Math.round(targetScroll));
    }

    function renderTimelineRangeView() {
      clearTimelineNowLineTimer();
      var el = document.getElementById('viewContent');
      if (!__cachedMonthData || !__cachedMonthData.rangeFrom || !__cachedMonthData.rangeTo) return;
      var all = __cachedMonthData.events || [];
      var rf = __cachedMonthData.rangeFrom;
      var rt = __cachedMonthData.rangeTo;
      var yRef = displayYearFromRange();
      if (!all.length) {
        el.innerHTML = '<div class="empty">この期間にイベントはありません。</div>';
        return;
      }
      var dateIsos = eachDateIsoInRange(rf, rt);
      var fr = filterEvents(all);
      markU13RiskFlags(fr);
      var grouped = groupEventsByIsoDate(fr);
      el.innerHTML = buildTimelineForDates(dateIsos, grouped, yRef, 'tlMonthScroll', __cachedMonthData && __cachedMonthData.holiday_isos);
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          var anchorIso = __tlAfterEditScrollIso;
          __tlAfterEditScrollIso = '';
          if (anchorIso) scrollTimelineMonthToDate(anchorIso);
          else scrollTimelineMonthToToday();
          updateTimelineNowLineMarkers();
          startTimelineNowLineTimer();
        });
      });
    }

    function refreshScheduleView() {
      updateToolbarForView();

    function buildTodoRowsHtml(todos) {
      if (!todos || !todos.length) {
        return '<div class="todo-empty">まだタスクはありません。下の入力から追加できます。</div>';
      }
      todos = todos.slice().sort(function(a, b) { return (a.done ? 1 : 0) - (b.done ? 1 : 0); });
      var h = '';
      var i;
      for (i = 0; i < todos.length; i++) {
        var t = todos[i];
        var done = !!t.done;
        h += '<div class="todo-row" data-todo-id="' + escAttr(t.id) + '">';
        h += '<button type="button" class="todo-check' + (done ? ' todo-check--done' : '') + '" data-todo-toggle="' + escAttr(t.id) + '" aria-label="' + (done ? '未完了に戻す' : '完了にする') + '">';
        if (done) h += '✓';
        h += '</button>';
        h += '<span class="todo-row-status" role="status" aria-live="polite"></span>';
        h += '<span class="todo-text' + (done ? ' todo-text--done' : '') + '">' + esc(t.text) + '</span>';
        h += '<button type="button" class="todo-del" data-todo-del="' + escAttr(t.id) + '" aria-label="削除">×</button>';
        h += '</div>';
      }
      return h;
    }

    async function showTodoPanel() {
      var el = document.getElementById('viewContent');
      el.innerHTML =
        '<div class="todo-panel">' +
        '<div class="todo-header">' +
        '<h2 class="todo-title">ToDo</h2>' +
        '</div>' +
        '<div class="todo-toolbar">' +
        '<input type="text" id="todoNewInput" class="todo-new-input" placeholder="新しいタスク…" />' +
        '<button type="button" class="btn btn-primary" id="btnTodoAdd">追加</button>' +
        '<span id="todoAddStatus" class="todo-add-status" role="status" aria-live="polite" aria-busy="false"></span>' +
        '</div>' +
        '<div id="todoListMount" class="todo-list">読み込み中…</div></div>';
      document.getElementById('btnTodoAdd').addEventListener('click', todoPanelSubmitAdd);
      var inp0 = document.getElementById('todoNewInput');
      if (inp0) {
        inp0.addEventListener('keydown', function(ev) {
          if (ev.key === 'Enter') todoPanelSubmitAdd();
        });
      }
      var mount = document.getElementById('todoListMount');
      mount.addEventListener('click', async function(ev) {
        var tg = ev.target.closest('[data-todo-toggle]');
        var del = ev.target.closest('[data-todo-del]');
        if (tg) {
          if (tg.disabled) return;
          var id = tg.getAttribute('data-todo-toggle');
          var isDone = tg.classList.contains('todo-check--done');
          var row = tg.closest('.todo-row');
          var st = row && row.querySelector('.todo-row-status');
          var delBtn = row && row.querySelector('[data-todo-del]');
          tg.disabled = true;
          if (delBtn) delBtn.disabled = true;
          if (row) row.classList.add('todo-row--busy');
          if (st) st.textContent = '更新中…';
          try {
            await apiPostJson('/api/admin/app-todo-update', { id: id, done: !isDone });
            await reloadTodoListMount();
          } catch (e) {
            alert(esc(String(e.message || e)));
            tg.disabled = false;
            if (delBtn) delBtn.disabled = false;
            if (row) row.classList.remove('todo-row--busy');
            if (st) st.textContent = '';
          }
          return;
        }
        if (del) {
          if (del.disabled) return;
          var did = del.getAttribute('data-todo-del');
          if (!confirm('このタスクを削除しますか？')) return;
          var rowD = del.closest('.todo-row');
          var stD = rowD && rowD.querySelector('.todo-row-status');
          var chk = rowD && rowD.querySelector('[data-todo-toggle]');
          del.disabled = true;
          if (chk) chk.disabled = true;
          if (rowD) rowD.classList.add('todo-row--busy');
          if (stD) stD.textContent = '更新中…';
          try {
            await apiPostJson('/api/admin/app-todo-delete', { id: did });
            await reloadTodoListMount();
          } catch (e) {
            alert(esc(String(e.message || e)));
            del.disabled = false;
            if (chk) chk.disabled = false;
            if (rowD) rowD.classList.remove('todo-row--busy');
            if (stD) stD.textContent = '';
          }
        }
      });
      await reloadTodoListMount();
    }

        setWeekLoadBusy(false, '');
      }
    });
    document.getElementById('btnTodayJump').addEventListener('click', function() {
      if (!__lastMe || !__lastMe.access_granted) return;
      jumpToTodayFromButton();
    });

    bindTimelineLongPress();

    boot();
  </script>
</body>
